            <div><span style="color:var(--gray-400)">Consultor: </span><span style="color:var(--gray-700);font-weight:500">${p.consultor||'—'}</span></div>
            <div><span style="color:var(--gray-400)">Analista: </span><span style="color:var(--gray-700);font-weight:500">${p.analista||'—'}</span></div>
            <div><span style="color:var(--gray-400)">Início: </span><span>${fmt(p.dataInicio)}</span></div>
            <div><span style="color:var(--gray-400)">Go-live: </span><span>${fmt(p.goLive)}</span></div>
          </div>
          <div class="progress" style="margin-bottom:6px"><div class="progress-bar${pct===100?' green':''}" style="width:${pct}%"></div></div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <span style="font-size:11px;color:var(--gray-500)">${done}/${tasks.length} tarefas</span>
            <div style="display:flex;gap:6px;align-items:center">
              ${dl!==null ? `<span class="badge ${dl<0?'badge-red':dl<14?'badge-warn':'badge-green'}" style="font-size:10px">${dl<0?`${Math.abs(dl)}d atrasado`:`${dl}d`}</span>` : ''}
              <span style="font-size:13px;font-weight:700;color:${pct===100?'var(--success)':'var(--accent)'}">${pct}%</span>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

// ==================== MÓDULOS PADRONIZADOS DO PROJETO ====================
const PROJECT_MODULE_OPTIONS = ["Folha", "GED", "Ponto", "Cargos e Salários", "Orçamento"];

// Normaliza texto para comparação (minúsculas, sem acento, espaços colapsados, trim)
function normalizeModuleText(value) {
  return String(value || '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .toLowerCase().replace(/\s+/g, ' ').trim();
}

// Identifica se um texto corresponde a um módulo padrão; retorna o nome oficial ou null
function identifyStandardProjectModule(value) {
  const n = normalizeModuleText(value);
  if (!n) return null;
  const MAP = {
    'folha': 'Folha', 'folha de pagamento': 'Folha', 'payroll': 'Folha',
    'ged': 'GED', 'ged/kit': 'GED', 'kit': 'GED', 'gestao eletronica de documentos': 'GED',
    'ponto': 'Ponto', 'ponto eletronico': 'Ponto', 'controle de ponto': 'Ponto',
    'cargos e salarios': 'Cargos e Salários', 'cargos': 'Cargos e Salários', 'plano de cargos': 'Cargos e Salários',
    'orcamento': 'Orçamento', 'budget': 'Orçamento'
  };
  return MAP[n] || null;
}

// Junta itens legados ao texto de customizados existente, sem duplicar (idempotente)
function mergeCustomProjectItems(currentText, legacyItems) {
  const sep = /[;\n]/;
  const existentes = String(currentText || '').split(sep).map(s => s.trim()).filter(Boolean);
  const setNorm = new Set(existentes.map(normalizeModuleText));
  (legacyItems || []).forEach(item => {
    const t = String(item || '').trim();
    if (t && !setNorm.has(normalizeModuleText(t))) { existentes.push(t); setNorm.add(normalizeModuleText(t)); }
  });
  return existentes.join('; ');
}

// Normaliza os módulos de um projeto: reconhecidos → nomes oficiais; não reconhecidos → itensCustomizados.
// Idempotente: rodar várias vezes não duplica dados.
function normalizeProjectModules(project) {
  if (!project) return;
  if (typeof project.itensCustomizados !== 'string') project.itensCustomizados = '';
  const brutos = Array.isArray(project.modulos) ? project.modulos : [];
  const oficiais = [];
  const naoReconhecidos = [];
  brutos.forEach(m => {
    const oficial = identifyStandardProjectModule(m);
    if (oficial) { if (!oficiais.includes(oficial)) oficiais.push(oficial); }
    else { const t = String(m || '').trim(); if (t) naoReconhecidos.push(t); }
  });
  // reordena conforme PROJECT_MODULE_OPTIONS
  project.modulos = PROJECT_MODULE_OPTIONS.filter(opt => oficiais.includes(opt));
  if (naoReconhecidos.length) {
    project.itensCustomizados = mergeCustomProjectItems(project.itensCustomizados, naoReconhecidos);
  }
}

// Gera os checkboxes dos módulos padrão (com os selecionados marcados)
function renderProjectModuleCheckboxes(selectedModules = []) {
  const selNorm = new Set((selectedModules || []).map(normalizeModuleText));
  return `<div class="project-module-grid">
    ${PROJECT_MODULE_OPTIONS.map((opt, i) => {
      const checked = selNorm.has(normalizeModuleText(opt)) ? 'checked' : '';
      return `<label class="project-module-option" for="pmod-${i}">
        <input type="checkbox" id="pmod-${i}" name="pModulo" value="${opt}" ${checked}>
        <span>${opt}</span>
      </label>`;
    }).join('')}
  </div>`;
}

// Lê os checkboxes marcados via atributo value, na ordem de PROJECT_MODULE_OPTIONS
function getSelectedProjectModules() {
  const marcados = new Set(
    [...document.querySelectorAll('input[name="pModulo"]:checked')].map(c => c.value)
  );
  return PROJECT_MODULE_OPTIONS.filter(opt => marcados.has(opt));
}

// Marca os checkboxes conforme uma lista de módulos (tolerante a variações)
function setSelectedProjectModules(modules) {
  const selNorm = new Set((modules || []).map(normalizeModuleText));
  document.querySelectorAll('input[name="pModulo"]').forEach(c => {
    c.checked = selNorm.has(normalizeModuleText(c.value));
  });
}

// Exibição central dos módulos (chips) — usada em todas as telas
function renderProjectModules(project, options = {}) {
  const mods = Array.isArray(project.modulos) ? project.modulos : [];
  const custom = (project.itensCustomizados || '').trim();
  const compact = options.compact === true;
  if (!mods.length && !custom) {
    return options.hideWhenEmpty ? '' : `<span style="font-size:12px;color:var(--gray-400)">Nenhum módulo informado</span>`;
  }
  let chips = mods.map(m => `<span class="chip">${m}</span>`).join('');
  if (custom) {
    if (compact) {
      chips += `<span class="chip" style="background:var(--gray-100);color:var(--gray-600)" title="${custom.replace(/"/g,'&quot;')}"><i class="ti ti-puzzle" style="font-size:11px;vertical-align:-1px"></i> + Customizados</span>`;
    } else {
      chips += `<span class="chip" style="background:var(--gray-100);color:var(--gray-600)"><i class="ti ti-puzzle" style="font-size:11px;vertical-align:-1px"></i> Customizados</span>`;
    }
  }
  return chips;
}

// Atualiza a tela correta após salvar, conforme o contexto de origem

  renderSidebar();

    const p = state.projetos.find(x => x.id === projectId);
    document.getElementById('nav-projetos')?.classList.add('active');

// Marca um campo como inválido (circula em vermelho + mostra mensagem)
function marcarErroCampo(fid) {
  const f = document.getElementById(fid);
  const msg = document.getElementById('err-' + fid);
  if (f) f.classList.add('field-error');
  if (msg) msg.style.display = 'flex';
}
// Remove o destaque de erro de um campo
function limparErroCampo(fid) {
  const f = document.getElementById(fid);
  const msg = document.getElementById('err-' + fid);
  if (f) f.classList.remove('field-error');
  if (msg) msg.style.display = 'none';
}

async function salvarProjeto(editId) {
  try {
    const el = id => document.getElementById(id);
    if (!el('pNome') || !el('pCliente')) {
      alert('Erro ao ler o formulário. Feche e reabra o modal.');
      return;
    }

    // ── Validação de campos obrigatórios com destaque visual ──
    const obrigatorios = [
      { id: 'pNome',   label: 'Nome do projeto' },
      { id: 'pCliente',label: 'Cliente' },
      { id: 'pInicio', label: 'Data de início' },
      { id: 'pGoLive', label: 'Data Go-live' },
    ];
    obrigatorios.forEach(c => limparErroCampo(c.id));

    const faltando = obrigatorios.filter(c => !(el(c.id)?.value || '').trim());
    if (faltando.length) {
      faltando.forEach(c => marcarErroCampo(c.id));
      const alertBox = el('pFormAlert'), alertMsg = el('pFormAlertMsg');
      if (alertBox && alertMsg) {
        alertMsg.textContent = faltando.length === 1
          ? `O campo "${faltando[0].label}" é obrigatório.`
          : `Preencha os ${faltando.length} campos obrigatórios destacados.`;
        alertBox.style.display = 'flex';
      }
      const primeiro = el(faltando[0].id);
      if (primeiro) { primeiro.focus(); primeiro.scrollIntoView({behavior:'smooth', block:'center'}); }
      return;
    }

    const dataInicio = el('pInicio').value;
    const goLive = el('pGoLive').value;
    if (dataInicio && goLive && goLive < dataInicio) {
      marcarErroCampo('pGoLive');
      const alertBox = el('pFormAlert'), alertMsg = el('pFormAlertMsg');
      if (alertBox && alertMsg) {
        alertMsg.textContent = 'A data de Go-live não pode ser anterior à data de início.';
        alertBox.style.display = 'flex';
      }
      el('pGoLive').focus();
      return;
    }

    // ── Passou na validação: monta os dados ──
    const nome = el('pNome').value.trim();
    const cliente = el('pCliente').value.trim();
    const modulos = getSelectedProjectModules();
    const itensCustomizados = (el('pItensCustomizados')?.value || '').trim();
    let consultor = (el('pConsultor')?.value || '').trim();
    if (consultor === '__custom') consultor = (el('pConsultorCustom')?.value || '').trim();
    else if (consultor === '__none__') consultor = '';
    let analista = (el('pAnalista')?.value || '').trim();
    if (analista === '__custom') analista = (el('pAnalistaCustom')?.value || '').trim();
    else if (analista === '__none__') analista = '';

    if (!Array.isArray(state.projetos)) state.projetos = [];

    // ── Estado "salvando" no botão (Opção 1: salvar e confirmar) ──
    const btnSalvar = el('pBtnSalvar');
    const btnLabelOrig = btnSalvar ? btnSalvar.innerHTML : '';
    if (btnSalvar) { btnSalvar.disabled = true; btnSalvar.innerHTML = '<i class="ti ti-loader-2"></i> Salvando...'; }
    const reativarBotao = () => { if (btnSalvar) { btnSalvar.disabled = false; btnSalvar.innerHTML = btnLabelOrig; } };

    let projectId = editId;
    let contexto = 'lista';

    if (editId) {
      const p = state.projetos.find(x=>x.id===editId);
      if (!p) { reativarBotao(); alert('Projeto não encontrado.'); return; }
      // Monta a versão atualizada (sem tocar em tasks/cronograma)
      const atualizado = { ...p, nome, cliente, modulos, itensCustomizados, dataInicio, goLive, consultor, analista };
      // Grava no banco PRIMEIRO; só reflete na tela se confirmar.
      const res = await atualizarProjetoSupabase(atualizado);
      if (!res.ok) {
        reativarBotao();
        const alertBox = el('pFormAlert'), alertMsg = el('pFormAlertMsg');
        if (alertBox && alertMsg) { alertMsg.textContent = 'Não foi possível salvar: ' + res.error; alertBox.style.display = 'flex'; }
        else alert('Não foi possível salvar: ' + res.error);
        return;
      }
      Object.assign(p, { nome, cliente, modulos, itensCustomizados, dataInicio, goLive, consultor, analista, atualizadoEm: new Date().toISOString() });
      contexto = (state.currentProjetoId === editId && state.currentPage === 'projeto-detalhe') ? 'detalhe' : 'lista';
    } else {
      const tplId = el('pTemplate')?.value || '';
      const tpl = (state.checklistTemplates||[]).find(t=>t.id===tplId);
      const tasks = (tpl && Array.isArray(tpl.tasks))
        ? tpl.tasks.map(t=>({...t, id:uid(), templateTaskId:t.id, status:'pendente', prazo:null, comentario:'', macroActivityId:null}))
        : [];
      const novo = {
        id:uid(), nome, cliente, modulos, itensCustomizados, dataInicio, goLive,
        consultor, analista, tasks, templateId: tplId || null,
        macroActivities: [], macroMappings: [], risks: [], criadoEm: new Date().toISOString()
      };
      // Grava projeto + tarefas no banco PRIMEIRO.
      const res = await inserirProjetoSupabase(novo);
      if (!res.ok) {
        reativarBotao();
        const alertBox = el('pFormAlert'), alertMsg = el('pFormAlertMsg');
        if (alertBox && alertMsg) { alertMsg.textContent = 'Não foi possível criar o projeto: ' + res.error; alertBox.style.display = 'flex'; }
        else alert('Não foi possível criar o projeto: ' + res.error);
        return;
      }
      state.projetos.push(novo);
      projectId = novo.id;
    }

    reativarBotao();
    closeModal();
    refreshProjectViewAfterSave(projectId, contexto);
    notificar(editId ? 'Projeto atualizado com sucesso.' : 'Projeto criado com sucesso.', 'sucesso');
  } catch (err) {
    console.error('Erro ao salvar projeto:', err);
    const btnSalvar = document.getElementById('pBtnSalvar');
    if (btnSalvar) { btnSalvar.disabled = false; btnSalvar.innerHTML = '<i class="ti ti-check"></i> Salvar'; }
    alert('Não foi possível salvar o projeto: ' + err.message);
  }
}

function editarProjeto(id) {
  const p = state.projetos.find(x=>x.id===id);
  if (!p) return;
  renderProjectForm(id); // já monta o formulário preenchido, sem setTimeout
}

// ==================== PROJETO DETAIL ====================
function abrirProjeto(id) {
  const p = state.projetos.find(x=>x.id===id);
  if (!p) return;
  // Segurança: não-gestores só acessam seus próprios projetos
  if (!isGestor() && !projetosVisiveis().find(x=>x.id===id)) return;
  state.currentProjetoId = id;
  state.viewMode = 'lista';
  state.filterFase = ''; state.filterTema = ''; state.filterStatus = ''; state.filterResp = '';
  state.filterMacro = ''; state.filterMacroStatus = '';
  // Auto-expande a primeira fase (e suas macro entregas) uma vez por projeto, para não abrir tudo colapsado.
  if (!uiState._initedProjects[id]) {
    uiState._initedProjects[id] = true;
    const ordemFases = Object.keys(FASE_COLORS);
    const primeira = ordemFases.find(f => (p.tasks||[]).some(t => t.fase === f)) || (p.tasks||[])[0]?.fase;
    if (primeira) {
      uiState.expandedPhases[id + '::' + primeira] = true;
      // expande também as macro entregas da primeira fase
      try {
        const g = groupProjectTasksHierarchy(p, (p.tasks||[]).filter(t=>t.fase===primeira))[0];
        if (g) {
          g.macroDeliveries.forEach(d => {
            const dk = (d.macroActivity && d.macroActivity.id) || (d.macroActivity && d.macroActivity.macroKey) || d.status.key;
            uiState.expandedMacroDeliveries[id + '::' + primeira + '::' + dk] = true;
          });
          uiState.expandedMacroDeliveries[id + '::' + primeira + '::__unmapped'] = true;
        }
      } catch(e) {}
    }
  }
  renderProjetoDetail(p);
}

function renderProjetoDetail(p) {
  document.getElementById('page-title').textContent = p.nome;

function getFilteredTasks(p) {
  const fMacro = state.filterMacro || '';
  const fMacroStatus = state.filterMacroStatus || '';
  return (p.tasks||[]).filter(t => {
    if (state.filterFase && t.fase !== state.filterFase) return false;
    if (state.filterTema && t.tema !== state.filterTema) return false;
    if (state.filterStatus && t.status !== state.filterStatus) return false;
    if (fMacro || fMacroStatus) {
      const d = resolveTaskMacroDelivery(p, t);
      if (fMacro) {
        if (fMacro === '__none') { if (d.hasDelivery) return false; }
        else if ((d.macroActivityId || d.macroKey || d.macroName) !== fMacro) return false;
      }
      if (fMacroStatus) {
        // deriva o status da macro entrega desta tarefa
        if (!d.hasDelivery) return false;
        const tarefasIrmas = (p.tasks||[]).filter(x => {
          const dx = resolveTaskMacroDelivery(p, x);
          return dx.hasDelivery && (dx.macroActivityId||dx.macroKey||dx.macroName) === (d.macroActivityId||d.macroKey||d.macroName);
        });
        const prog = calculateMacroDeliveryProgress(p, d._macro, tarefasIrmas);
        const st = determineMacroDeliveryStatus(d._macro, d._mapping, prog);
        if (st.key !== fMacroStatus) return false;
      }
    }
    return true;
  });
}

function renderTaskView(p) {
  if (state.viewMode === 'macro') { renderCronogramaMacro(p); return; }
  if (state.viewMode === 'riscos') { renderProjectRisks(p); return; }
  const tasks = getFilteredTasks(p);
  const container = document.getElementById('task-view');
  if (state.viewMode === 'lista') renderLista(tasks, p, container);
  else if (state.viewMode === 'kanban') renderKanban(tasks, p, container);
  else renderCalendario(tasks, p, container);
}

// Limpa todo o cronograma macro do projeto (atividades, mapeamentos DE-PARA e prazos herdados),
// deixando o projeto pronto para uma nova importação do zero.
// Preserva tarefas concluídas e prazos definidos manualmente.
function limparCronogramaMacro(pId) {
  const p = state.projetos.find(x=>x.id===pId);
  if (!p) return;
  const nMacros = (p.macroActivities||[]).length;
  const nMaps = (p.macroMappings||[]).length;
  if (!confirm(
    `Limpar o cronograma macro deste projeto?\n\n`
    + `Serão removidas:\n`
    + `• ${nMacros} atividade(s) macro importada(s)\n`
    + `• ${nMaps} mapeamento(s) DE-PARA do projeto\n`
    + `• os prazos das tarefas que vieram do cronograma\n\n`
    + `Tarefas concluídas e prazos definidos manualmente serão preservados. `
    + `O DE-PARA padrão do template NÃO é afetado.\n\nDeseja continuar?`
  )) return;

  // Remove atividades macro e mapeamentos do projeto
  p.macroActivities = [];
  p.macroMappings = [];

  // Limpa o vínculo e o prazo herdado das tarefas (preserva concluídas e prazos manuais)
  let prazosLimpos = 0;
  (p.tasks||[]).forEach(t => {
    t.macroActivityId = null;
    if (t.status === 'concluida') return;
    if (t._prazoManual) return;
    if (t.prazoOrigem === 'macro') { t.prazo = null; t.prazoOrigem = null; prazosLimpos++; }
  });

  saveState();
  renderProjetoDetail(p);
  notificar(`Cronograma macro limpo: ${nMacros} atividade(s) e ${nMaps} mapeamento(s) removidos, ${prazosLimpos} prazo(s) limpo(s). Pronto para nova importação.`, 'sucesso');
}

// Converte um valor de data do Excel (serial ou string) para 'YYYY-MM-DD'
function excelParaDataISO(v) {
  if (v === null || v === undefined || v === '') return null;
  // Número serial do Excel
  if (typeof v === 'number' && isFinite(v)) {
    // SheetJS: usa epoch 1899-12-30
    const d = XLSX.SSF ? XLSX.SSF.parse_date_code(v) : null;
    if (d && d.y) {
      const mm = String(d.m).padStart(2,'0');
      const dd = String(d.d).padStart(2,'0');
      return `${d.y}-${mm}-${dd}`;
    }
  }
  // Objeto Date
  if (v instanceof Date && !isNaN(v)) {
    return `${v.getFullYear()}-${String(v.getMonth()+1).padStart(2,'0')}-${String(v.getDate()).padStart(2,'0')}`;
  }
  // String: tenta dd/mm/yyyy ou yyyy-mm-dd
  const s = String(v).trim();
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (m) {
    let [_, dd, mm, yy] = m;
    if (yy.length === 2) yy = '20'+yy;
    return `${yy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
  }
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
  return null;
}

// Normaliza texto de cabeçalho para comparação (sem acento, minúsculo, sem espaços extras)
function normHeader(s) {
  return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}

// Converte "% concluída" (0-1, 0-100 ou "50%") em inteiro 0-100
function parseProgresso(v) {
  if (v === null || v === undefined || v === '') return 0;
  if (typeof v === 'number') return Math.round(v <= 1 ? v*100 : v);
  const s = String(v).replace('%','').replace(',','.').trim();
  const n = parseFloat(s);
  if (isNaN(n)) return 0;
  return Math.round(n <= 1 ? n*100 : n);
}

// Lê o arquivo selecionado e monta a prévia
function lerArquivoCronograma(ev, pId) {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('importStatus');
  const showStatus = (msg, cor) => { if (statusEl) { statusEl.style.display='block'; statusEl.innerHTML = `<span style="color:${cor||'var(--gray-500)'}">${msg}</span>`; } };
  showStatus('<i class="ti ti-loader"></i> Lendo arquivo...');

  if (typeof XLSX === 'undefined') { showStatus('Biblioteca de leitura não carregada.', 'var(--danger)'); return; }

  const reader = new FileReader();
  reader.onerror = () => showStatus('Falha ao ler o arquivo.', 'var(--danger)');
  reader.onload = (e) => {
    try {
      const wb = XLSX.read(e.target.result, { type:'array', cellDates:false });
      // Localizar a aba esperada (tolerante a variações)
      const abaNome = wb.SheetNames.find(n => normHeader(n) === normHeader('Tarefas do projeto'))
                   || wb.SheetNames.find(n => normHeader(n).includes('tarefas do projeto'));
      if (!abaNome) {
        showStatus('Aba "Tarefas do projeto" não encontrada no arquivo. Abas disponíveis: ' + wb.SheetNames.join(', '), 'var(--danger)');
        return;
      }
      const ws = wb.Sheets[abaNome];
      const matriz = XLSX.utils.sheet_to_json(ws, { header:1, raw:true, defval:null });

      // Localizar a linha de cabeçalho procurando pelas 4 colunas obrigatórias
      const alvos = ['numero de tarefa','nome','inicio','concluir'];
      let headerRow = -1, colMap = {};
      for (let i=0; i<Math.min(matriz.length, 40); i++) {
        const linha = matriz[i] || [];
        const norms = linha.map(normHeader);
        const temTodos = alvos.every(a => norms.some(h => h === a || h.includes(a)));
        if (temTodos) { headerRow = i; break; }
      }
      if (headerRow === -1) {
        showStatus('Não foi possível localizar a linha de cabeçalho (colunas "Número de tarefa", "Nome", "Início" e "Concluir").', 'var(--danger)');
        return;
      }

      // Mapear índices das colunas conhecidas
      const cabec = (matriz[headerRow]||[]).map(normHeader);
      const acharCol = (...nomes) => {
        for (const nome of nomes) {
          const alvo = normHeader(nome);
          const idx = cabec.findIndex(h => h === alvo);
          if (idx !== -1) return idx;
          const idx2 = cabec.findIndex(h => h.includes(alvo));
          if (idx2 !== -1) return idx2;
        }
        return -1;
      };
      colMap = {
        numero:    acharCol('Número de tarefa'),
        hierarquia:acharCol('Número do nível hierárquico','nivel hierarquico'),
        nome:      acharCol('Nome'),
        inicio:    acharCol('Início'),
        concluir:  acharCol('Concluir'),
        rotulos:   acharCol('Rótulos'),
        progresso: acharCol('% concluída','concluida'),
        atribuida: acharCol('Atribuída a','atribuida a'),
        duracao:   acharCol('Duração'),
        bucket:    acharCol('Bucket'),
        prioridade:acharCol('Prioridade'),
        depende:   acharCol('Depende de'),
        marco:     acharCol('Marco'),
        notas:     acharCol('Notas'),
        concluido: acharCol('Concluído'),
        checklist: acharCol('Itens da Lista de Verificação','lista de verificacao'),
      };

      // Extrair linhas de dados
      const dados = [];
      for (let i=headerRow+1; i<matriz.length; i++) {
        const linha = matriz[i] || [];
        if (linha.every(c => c === null || String(c).trim() === '')) continue; // linha totalmente vazia
        const get = (idx) => idx>=0 ? linha[idx] : null;
        const numero = get(colMap.numero);
        const nome = get(colMap.nome);
        const hierarquia = colMap.hierarquia>=0 ? (get(colMap.hierarquia)!=null?String(get(colMap.hierarquia)).trim():null) : null;
        // Regra 1: ignorar linhas sem número de tarefa ou sem nome
        if (numero===null || String(numero).trim()==='' || nome===null || String(nome).trim()==='') continue;
        dados.push({
          numero: String(numero).trim(),
          hierarquia,
          nome: String(nome).trim(),
          inicio: excelParaDataISO(get(colMap.inicio)),
          concluir: excelParaDataISO(get(colMap.concluir)),
          rotulos: colMap.rotulos>=0 ? (get(colMap.rotulos)||'') : '',
          progresso: parseProgresso(get(colMap.progresso)),
          atribuida: colMap.atribuida>=0 ? (get(colMap.atribuida)||'') : '',
          bucket: colMap.bucket>=0 ? (get(colMap.bucket)||'') : '',
          _raw: linha
        });
      }

      // Índice de códigos hierárquicos para detectar agrupadores (regra 6)
      const codigos = new Set(dados.map(d => d.hierarquia).filter(Boolean));
      const temFilhos = (codigo) => {
        if (!codigo) return false;
        for (const c of codigos) { if (c !== codigo && c.startsWith(codigo + '.')) return true; }
        return false;
      };
      const nivelDe = (codigo) => codigo ? codigo.split('.').length : 1;

      // Nome do ancestral de nível 2 → usado como "fase" (regra de FASE DA ATIVIDADE)
      const mapaPorCodigo = {};
      dados.forEach(d => { if (d.hierarquia) mapaPorCodigo[d.hierarquia] = d; });
      const faseDe = (codigo) => {
        if (!codigo) return null;
        const seg = codigo.split('.');
        if (seg.length < 2) return null;
        const codNivel2 = seg.slice(0,2).join('.');
        const anc = mapaPorCodigo[codNivel2];
        return anc ? anc.nome : null;
      };

      // Classificar cada linha como importável ou não
      const macrosExistentes = (state.projetos.find(x=>x.id===pId)?.macroActivities)||[];
      const linhas = dados.map(d => {
        const nivel = nivelDe(d.hierarquia);
        const agrupador = temFilhos(d.hierarquia);
        const raiz = nivel === 1; // regra 2
        const temData = !!(d.inicio || d.concluir);
        // Regra 5: importável = tem nome + tem data + não é agrupador + não é raiz
        const importavel = !!d.nome && temData && !agrupador && !raiz;
        const externalId = 'planner:' + d.numero;
        // Status frente ao que já existe
        const existente = macrosExistentes.find(m => m.externalId === externalId);
        let situacao = 'nova';
        if (existente) {
          const mudou = existente.name !== d.nome
            || existente.startDate !== d.inicio
            || existente.endDate !== d.concluir
            || existente.progress !== d.progresso
            || existente.phase !== faseDe(d.hierarquia);
          situacao = mudou ? 'alterada' : 'existente';
        }
        return {
          numero: d.numero,
          hierarquia: d.hierarquia,
          nome: d.nome,
          fase: faseDe(d.hierarquia),
          inicio: d.inicio,
          concluir: d.concluir,
          progresso: d.progresso,
          responsavel: (d.atribuida && String(d.atribuida).trim()) ? String(d.atribuida).trim() : (String(d.rotulos||'').trim() || null), // regra 9
          bucket: String(d.bucket||'').trim() || null, // regra 10
          externalId,
          nivel, agrupador, raiz, temData,
          importavel,
          selecionado: importavel, // por padrão marca os importáveis
          situacao
        };
      });

      const validas = linhas.filter(l => l.importavel).length;
      if (validas === 0 && !linhas.some(l => l.agrupador)) {
        showStatus('Nenhuma atividade válida foi encontrada no arquivo. Verifique se as linhas possuem nome e datas.', 'var(--warn)');
        return;
      }

      _importPreview = { pId, linhas, nomeArquivo: file.name };
      abrirModalPrevia();
    } catch (err) {
      console.error('Erro ao processar cronograma:', err);
      showStatus('Erro ao processar o arquivo: ' + err.message, 'var(--danger)');
    }
  };
  reader.readAsArrayBuffer(file);
}

  const { linhas, nomeArquivo } = _importPreview;
  const importaveis = linhas.filter(l => l.importavel).length;
  const agrupadores = linhas.filter(l => l.agrupador && !l.raiz).length;

  const situacaoBadge = (s) => {
    if (s==='nova') return '<span class="badge badge-blue" style="font-size:10px">Nova</span>';
    if (s==='alterada') return '<span class="badge badge-warn" style="font-size:10px">Alterada</span>';
    return '<span class="badge badge-gray" style="font-size:10px">Já existente</span>';
  };

  const linhaHTML = (l, i) => {
    const desab = !l.importavel && !l._incluirManual;
    return `<tr style="${desab?'opacity:.5':''}">
      <td style="text-align:center"><input type="checkbox" class="task-check" ${l.selecionado?'checked':''} onchange="togglePreviewLinha(${i},this.checked)"></td>
      <td style="font-size:12px;color:var(--gray-500)">${l.numero}</td>
      <td style="font-size:12px;color:var(--gray-500);font-family:monospace">${l.hierarquia||'—'}</td>

        ${l.raiz ? `<span class="badge badge-gray" style="font-size:9px;margin-left:4px">raiz</span>` : ''}
      </td>
      <td style="font-size:12px;color:var(--gray-600)">${l.fase||'—'}</td>
      <td style="font-size:12px;color:var(--gray-500)">${fmt(l.inicio)}</td>
      <td style="font-size:12px;color:var(--gray-500)">${fmt(l.concluir)}</td>
      <td style="font-size:12px;color:var(--gray-500)">${l.progresso}%</td>
      <td style="font-size:12px;color:var(--gray-600)">${l.responsavel||'—'}</td>
      <td>${situacaoBadge(l.situacao)}
        ${(l.agrupador && !l.raiz && !l.importavel) ? `<button class="btn btn-ghost btn-sm" style="font-size:10px;padding:2px 6px" onclick="incluirAgrupador(${i})" title="Incluir esta linha agrupadora como atividade">+ incluir</button>` : ''}

  openModal(`<div class="modal-header">
    <div class="modal-title"><i class="ti ti-eye" style="margin-right:8px;color:var(--accent)"></i>Prévia da importação</div>

  </div>
  <div class="modal-body">
    <div class="alert alert-info" style="margin-bottom:12px"><i class="ti ti-file-spreadsheet"></i>
      <strong>${nomeArquivo}</strong> · ${linhas.length} linhas lidas · ${importaveis} atividade(s) importável(is) · ${agrupadores} agrupador(es)</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn btn-secondary btn-sm" onclick="selecionarTodasPrevia(true)"><i class="ti ti-checkbox"></i> Selecionar todas</button>
      <button class="btn btn-secondary btn-sm" onclick="selecionarTodasPrevia(false)"><i class="ti ti-square"></i> Desmarcar todas</button>
      <div style="flex:1"></div>
      <span style="font-size:12px;color:var(--gray-400);align-self:center" id="previewCount"></span>
    </div>
    <div class="table-wrap" style="max-height:52vh;overflow-y:auto;border:1px solid var(--gray-200);border-radius:8px">

          <th>Início</th><th>Término</th><th>Progresso</th><th>Responsável</th><th>Situação</th>

function togglePreviewLinha(i, checked) {
  if (_importPreview && _importPreview.linhas[i]) {
    _importPreview.linhas[i].selecionado = checked;
    atualizarContadorPrevia();
  }
}
function selecionarTodasPrevia(marcar) {
  if (!_importPreview) return;
  _importPreview.linhas.forEach(l => {
    // Só marca linhas elegíveis (importáveis ou agrupadores incluídos manualmente)
    if (marcar) { if (l.importavel || l._incluirManual) l.selecionado = true; }
    else l.selecionado = false;
  });
  abrirModalPrevia();
}
// Regra 7: incluir manualmente uma linha agrupadora na prévia
function incluirAgrupador(i) {
  if (!_importPreview || !_importPreview.linhas[i]) return;
  const l = _importPreview.linhas[i];
  l._incluirManual = true;
  l.importavel = true;
  l.selecionado = true;
  abrirModalPrevia();
}
function atualizarContadorPrevia() {
  const el = document.getElementById('previewCount');
  if (el && _importPreview) {
    const n = _importPreview.linhas.filter(l => l.selecionado).length;
    el.textContent = `${n} selecionada(s) para importar`;
  }
}

// Confirma a importação: cria/atualiza atividades macro conforme externalId
function confirmarImportacao() {
  // Envolve TODA a função para garantir feedback em qualquer cenário de erro.
  try {
    if (!_importPreview) { notificar('Nada para importar (a prévia foi perdida). Selecione o arquivo novamente.', 'erro'); return; }
    const { pId, linhas } = _importPreview;
    const p = state.projetos.find(x=>x.id===pId);
    if (!p) { notificar('Projeto não encontrado.', 'erro'); closeModal(); return; }
    if (!Array.isArray(p.macroActivities)) p.macroActivities = [];

    const selecionadas = linhas.filter(l => l.selecionado && (l.importavel || l._incluirManual));
    if (!selecionadas.length) { notificar('Selecione ao menos uma atividade para importar.', 'aviso'); return; }

    const agora = new Date().toISOString();
    let novas = 0, atualizadas = 0;

    selecionadas.forEach(l => {
      const existente = p.macroActivities.find(m => m.externalId === l.externalId);
      if (existente) {
        const mudou = existente.name !== l.nome || existente.hierarchyCode !== l.hierarquia
          || existente.phase !== l.fase || existente.startDate !== l.inicio
          || existente.endDate !== l.concluir || existente.progress !== l.progresso
          || existente.responsible !== l.responsavel || existente.bucket !== l.bucket;
        existente.name = l.nome;
        existente.hierarchyCode = l.hierarquia;
        existente.phase = l.fase;
        existente.startDate = l.inicio;
        existente.endDate = l.concluir;
        existente.progress = l.progresso;
        existente.responsible = l.responsavel;
        existente.bucket = l.bucket;
        if (existente.importStatus === 'not-found') existente.importStatus = 'ok';
        if (mudou) { existente.lastUpdatedAt = agora; atualizadas++; }
      } else {
        p.macroActivities.push({
          id: uid(),
          externalId: l.externalId,
          hierarchyCode: l.hierarquia,
          macroKey: null,
          name: l.nome,
          phase: l.fase,
          startDate: l.inicio,
          endDate: l.concluir,
          progress: l.progresso,
          responsible: l.responsavel,
          bucket: l.bucket,
          source: 'planner-import',
          importStatus: 'ok',
          importedAt: agora,
          lastUpdatedAt: agora
        });
        novas++;
      }
    });

    // Marca como not-found as que existiam e não vieram neste arquivo.
    const idsNoArquivo = new Set(linhas.map(l => l.externalId));
    let naoEncontradas = 0;
    p.macroActivities.forEach(m => {
      if (m.source === 'planner-import' && !idsNoArquivo.has(m.externalId)) {
        if (m.importStatus !== 'not-found') { m.importStatus = 'not-found'; naoEncontradas++; }
      }
    });

    // DE-PARA + prazos (com proteção própria para não abortar a importação toda)
    let herdados = 0, prazosAtualizados = 0;
    try {
      reconciliarMapeamentos(p);
      herdados = aplicarDeParaTemplate(p);
      prazosAtualizados = propagarPrazosMacro(p);
    } catch (err) {
      console.error('Erro ao aplicar DE-PARA/prazos:', err);
      notificar('Atividades importadas, mas houve um erro ao aplicar o DE-PARA/prazos: ' + err.message, 'aviso');
    }

    const ignoradas = linhas.length - selecionadas.length;

    // Salva ANTES de renderizar, para não perder a importação se a tela falhar.
    const salvou = saveState();
    _importPreview = null;
    closeModal();

    const msg = `Importação concluída.\n\n`
      + `• ${novas} nova(s) atividade(s)\n`
      + `• ${atualizadas} atualizada(s)\n`
      + `• ${ignoradas} ignorada(s)/não selecionada(s)`
      + (herdados ? `\n• ${herdados} vínculo(s) herdado(s) do DE-PARA padrão` : '')
      + (prazosAtualizados ? `\n• ${prazosAtualizados} prazo(s) de tarefa atualizado(s) pelas datas do cronograma` : '')
      + (naoEncontradas ? `\n• ${naoEncontradas} não encontrada(s) no novo arquivo` : '')
      + (salvou === false ? `\n\n⚠ Atenção: não foi possível salvar no navegador (armazenamento cheio).` : '');

    try {
      renderProjetoDetail(p);
    } catch (err) {
      console.error('Erro ao renderizar projeto após importação:', err);
    }

    // Feedback garantido: toast visual na tela + alert (o toast funciona mesmo se o alert estiver suprimido)
    notificar(`Importação concluída: ${novas} nova(s), ${atualizadas} atualizada(s), ${prazosAtualizados} prazo(s) definido(s).`, 'sucesso');
    setTimeout(() => { try { alert(msg); } catch(e){} }, 120);

  } catch (err) {
    console.error('Erro fatal na importação:', err);
    notificar('Erro ao importar o cronograma: ' + (err && err.message ? err.message : err), 'erro');
    try { alert('Ocorreu um erro ao importar o cronograma:\n\n' + (err && err.message ? err.message : err) + '\n\nNenhuma alteração foi aplicada.'); } catch(e){}
  }
}

// Notificação visual (toast) — feedback que NÃO depende de alert(), que pode ser suprimido pelo navegador.
function notificar(mensagem, tipo) {
  try {
    let host = document.getElementById('toast-host');
    if (!host) {
      host = document.createElement('div');
      host.id = 'toast-host';
      host.style.cssText = 'position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:380px';
      document.body.appendChild(host);
    }
    const cores = {
      sucesso: {bg:'#f0fdf4', border:'#86efac', color:'#166534', icon:'ti-circle-check'},
      erro:    {bg:'#fef2f2', border:'#fca5a5', color:'#991b1b', icon:'ti-alert-circle'},
      aviso:   {bg:'#fffbeb', border:'#fcd34d', color:'#92400e', icon:'ti-alert-triangle'},
      info:    {bg:'#eff6ff', border:'#93c5fd', color:'#1e40af', icon:'ti-info-circle'},
    };
    const c = cores[tipo] || cores.info;
    const el = document.createElement('div');
    el.style.cssText = `background:${c.bg};border:1px solid ${c.border};color:${c.color};border-radius:10px;padding:12px 14px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.12);display:flex;align-items:flex-start;gap:8px;animation:toastIn .2s ease-out`;
    el.innerHTML = `<i class="ti ${c.icon}" style="font-size:16px;flex-shrink:0;margin-top:1px"></i><div style="flex:1">${mensagem}</div><i class="ti ti-x" style="cursor:pointer;opacity:.6" onclick="this.parentElement.remove()"></i>`;
    host.appendChild(el);
    setTimeout(() => { if (el.parentElement) el.style.opacity = '0'; }, tipo === 'erro' ? 8000 : 5000);
    setTimeout(() => { if (el.parentElement) el.remove(); }, tipo === 'erro' ? 8400 : 5400);
  } catch (e) {
    console.error('Falha ao notificar:', e, '| mensagem original:', mensagem);
  }
}


// ==================== DE-PARA (macro ↔ micro) ====================
// Estado temporário da edição do DE-PARA (não persiste até salvar)
let _deParaDraft = null; // { pId, mappings:[...], selMacroId, selMicroIds:Set, dirty }

// Gera macroKey a partir do nome: maiúsculas, sem acento, pontuação→_, sem _ duplicado
function gerarMacroKey(nome) {
  return String(nome||'')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')  // remove acentos
    .toUpperCase()
    .replace(/[^A-Z0-9]+/g,'_')                        // pontuação/espaços → _
    .replace(/_+/g,'_')                                // _ duplicados
    .replace(/^_|_$/g,'');                             // _ nas pontas
}

// Garante macroKey única no projeto (acrescenta sufixo numérico se colidir)
function macroKeyUnica(base, mappings, ignoreId) {
  let key = base || 'ATIVIDADE';
  const existe = (k) => mappings.some(mp => mp.macroKey === k && mp.id !== ignoreId);
  if (!existe(key)) return key;
  let i = 2;
  while (existe(key + '_' + i)) i++;
  return key + '_' + i;
}

// Reconcilia mapeamentos com as atividades macro atualmente importadas.
// Regras: 1) reencontrar por externalId; 2) senão por macroKey; 3) senão marcar não localizada.
// Nunca desvincula tarefas nem refaz análise textual.
function reconciliarMapeamentos(p) {
  if (!Array.isArray(p.macroMappings)) p.macroMappings = [];
  const macros = Array.isArray(p.macroActivities) ? p.macroActivities : [];
  p.macroMappings.forEach(mp => {
    let macro = null;
    // 1) por externalId
    if (mp.macroExternalId) macro = macros.find(m => m.externalId === mp.macroExternalId && m.importStatus !== 'not-found');
    // 2) por macroKey (quando a atividade tiver a mesma macroKey)
    if (!macro && mp.macroKey) macro = macros.find(m => m.macroKey === mp.macroKey && m.importStatus !== 'not-found');
    if (macro) {
      mp.macroActivityId = macro.id;
      mp.macroExternalId = macro.externalId || mp.macroExternalId;
      if (!macro.macroKey) macro.macroKey = mp.macroKey; // grava a macroKey na atividade
      if (mp._status === 'nao-localizada') mp._status = null;
    } else {
      // não encontrada nem por externalId nem por macroKey
      mp.macroActivityId = null;
      mp._status = 'nao-localizada';
    }
  });
}

// Calcula o status de exibição de um mapeamento
function statusMapeamento(mp) {
  if (mp._status === 'nao-localizada') return { key:'nao-localizada', label:'Atividade macro não localizada', badge:'badge-red', icon:'ti-alert-triangle' };
  if (!mp.macroActivityId) return { key:'sem-depara', label:'Nova atividade sem DE-PARA', badge:'badge-warn', icon:'ti-help-circle' };
  if (!mp.microTaskIds || mp.microTaskIds.length === 0) return { key:'sem-micro', label:'Sem tarefas micro', badge:'badge-gray', icon:'ti-unlink' };
  return { key:'configurado', label:'Configurado', badge:'badge-green', icon:'ti-check' };
}

// Aplica o DE-PARA padrão do template ao projeto (herança via macroKey).
// Roda após a importação. Para cada atividade macro importada:
//   1. gera/atribui a macroKey a partir do nome (se ainda não tiver);
//   2. busca no template uma entrada com a mesma macroKey;
//   3. cria o mapeamento do projeto herdando as tarefas, traduzindo templateTaskId → id local;
//   4. NÃO sobrescreve mapeamentos que o usuário já ajustou manualmente (exceção local).
// Retorna a quantidade de vínculos herdados.
function aplicarDeParaTemplate(p) {
  const tpl = (state.checklistTemplates||[]).find(t => t.id === p.templateId);
  if (!tpl || !Array.isArray(tpl.deParaTemplate) || tpl.deParaTemplate.length === 0) return 0;
  if (!Array.isArray(p.macroMappings)) p.macroMappings = [];
  const macros = (p.macroActivities||[]).filter(m => m.importStatus !== 'not-found');

  // Índice: templateTaskId → id da tarefa no projeto
  const tplTaskToLocal = {};
  (p.tasks||[]).forEach(t => { if (t.templateTaskId) tplTaskToLocal[t.templateTaskId] = t.id; });

  let herdados = 0;
  macros.forEach(macro => {
    // 1) garante macroKey na atividade (gera do nome se ainda não tiver)
    if (!macro.macroKey) macro.macroKey = gerarMacroKey(macro.name);
    // 2) entrada do template com essa macroKey
    const entrada = tpl.deParaTemplate.find(e => e.macroKey === macro.macroKey);
    if (!entrada) return; // sem correspondência no template → fica "sem DE-PARA"

    // 3) mapeamento existente para esta macro (por macroKey)?
    let mp = p.macroMappings.find(m => m.macroKey === macro.macroKey);
    const tarefasLocais = (entrada.checklistTaskIds||[])
      .map(ctid => tplTaskToLocal[ctid])
      .filter(Boolean);

    if (!mp) {
      // cria novo mapeamento herdado do template
      const agora = new Date().toISOString();
      mp = {
        id: uid(),
        macroKey: macro.macroKey,
        macroActivityId: macro.id,
        macroExternalId: macro.externalId || null,
        macroNameSnapshot: macro.name || '',
        microTaskIds: tarefasLocais,
        origem: 'template',            // marca que veio do padrão (permite distinguir exceções)
        createdAt: agora,
        updatedAt: agora
      };
      p.macroMappings.push(mp);
      herdados += tarefasLocais.length;
    } else if (mp.origem === 'template' && !mp._ajustadoManualmente) {
      // atualiza apontamento da atividade, preservando ajustes manuais quando houver
      mp.macroActivityId = macro.id;
      mp.macroExternalId = macro.externalId || mp.macroExternalId;
      mp.macroNameSnapshot = macro.name || mp.macroNameSnapshot;
      // reaplica as tarefas do template (herança), pois não foi ajustado manualmente
      mp.microTaskIds = tarefasLocais;
      mp.updatedAt = new Date().toISOString();
    }
    // se o usuário ajustou manualmente (mp._ajustadoManualmente), preserva como está (exceção local)
  });

  // Preenche macroActivityId nas tarefas herdadas
  p.macroMappings.forEach(mp => (mp.microTaskIds||[]).forEach(tid => {
    const t = (p.tasks||[]).find(x=>x.id===tid);
    if (t) t.macroActivityId = mp.macroActivityId;
  }));

  return herdados;
}

// Propaga as datas das atividades macro para o prazo das tarefas micro vinculadas.
// Regra: cada tarefa micro recebe como prazo a data de TÉRMINO (endDate) da atividade
// macro à qual está vinculada — assim todos que veem o projeto enxergam o mesmo prazo.
// Não altera tarefas concluídas (preserva o histórico) nem prazos ajustados manualmente
// depois da última importação (marcados com _prazoManual).
// Retorna quantas tarefas tiveram o prazo atualizado.
function propagarPrazosMacro(p) {
  if (!Array.isArray(p.macroMappings)) return 0;
  const macros = Array.isArray(p.macroActivities) ? p.macroActivities : [];
  let atualizadas = 0;
  p.macroMappings.forEach(mp => {
    const macro = macros.find(m => m.id === mp.macroActivityId && m.importStatus !== 'not-found');
    if (!macro) return;
    // usa término; se não houver, usa início como fallback
    const novoPrazo = macro.endDate || macro.startDate || null;
    if (!novoPrazo) return;
    (mp.microTaskIds||[]).forEach(tid => {
      const t = (p.tasks||[]).find(x=>x.id===tid);
      if (!t) return;
      if (t.status === 'concluida') return;   // não mexe em tarefa concluída
      if (t._prazoManual) return;              // respeita prazo definido manualmente
      if (t.prazo !== novoPrazo) { t.prazo = novoPrazo; t.prazoOrigem = 'macro'; atualizadas++; }
    });
  });
  return atualizadas;
}

// Abre o modal de configuração do DE-PARA
function modalConfigurarDePara(pId) {
  const p = state.projetos.find(x=>x.id===pId);
  if (!p) return;
  if (!Array.isArray(p.macroActivities) || p.macroActivities.length === 0) {
    alert('Importe o cronograma macro antes de configurar o DE-PARA.');
    return;
  }
  // Monta o rascunho a partir dos mapeamentos salvos (cópia profunda)
  reconciliarMapeamentos(p);
  const mappings = JSON.parse(JSON.stringify(p.macroMappings || []));
  // Cria mapeamentos "Sem DE-PARA" para atividades macro importadas que ainda não têm mapping
  p.macroActivities.forEach(m => {
    if (m.importStatus === 'not-found') return;
    const jaTem = mappings.some(mp => mp.macroActivityId === m.id || (mp.macroExternalId && mp.macroExternalId === m.externalId));
    if (!jaTem) {
      mappings.push({
        id: uid(),
        macroKey: m.macroKey || null,          // pode ser null até o usuário confirmar
        macroActivityId: m.id,
        macroExternalId: m.externalId || null,
        macroNameSnapshot: m.name || '',
        microTaskIds: [],
        createdAt: null,                        // null = ainda não salvo
        updatedAt: null,
        _novo: true
      });
    }
  });
  _deParaDraft = { pId, mappings, selMacroId: null, selMicroIds: new Set(), dirty: false };
  renderModalDePara();
}

// Renderiza o modal de DE-PARA (duas áreas)
function renderModalDePara() {
  if (!_deParaDraft) return;
  const p = state.projetos.find(x=>x.id===_deParaDraft.pId);

  if (macroSelObj) {

  }

  const microRows = microList.map(t => {
    const mpDe = taskToMapping[t.id];
    const macroVinc = mpDe ? (macros.find(m=>m.id===mpDe.macroActivityId)?.name || mpDe.macroNameSnapshot) : null;
    const checked = selMicroIds.has(t.id);

    const tc = TEMA_COLORS[t.tema] || '#64748b';
    // destaque: verde se pertence à macro selecionada, azul se apenas marcada
    const bg = daMacroSel ? 'background:#f0fdf4;border-left:3px solid var(--success)' : checked ? 'background:var(--accent-light);border-left:3px solid var(--accent)' : 'border-left:3px solid transparent';
    return `<tr style="${bg}">
      <td style="text-align:center"><input type="checkbox" class="task-check" ${checked?'checked':''} onchange="deParaToggleMicro('${t.id}',this.checked)"></td>
      <td style="font-size:12px;font-weight:500;color:var(--gray-800)">
        ${daMacroSel?`<i class="ti ti-link" style="font-size:12px;color:var(--success);vertical-align:-1px;margin-right:3px" title="Vinculada à macro selecionada"></i>`:''}${t.tarefa}
      </td>
      <td style="font-size:11px;color:var(--gray-500);white-space:nowrap">${t.fase||'—'}</td>
      <td><span class="badge" style="background:${tc}18;color:${tc};font-size:10px">${t.tema||'—'}</span></td>
      <td style="font-size:11px">${macroVinc ? `<span style="color:var(--success);display:inline-flex;align-items:center;gap:3px"><i class="ti ti-link" style="font-size:11px"></i> ${macroVinc}</span>` : `<span style="color:var(--gray-300)">—</span>`}</td>
