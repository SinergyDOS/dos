  state.mtDuePeriod = 'todas'; state.mtDueSearch = ''; state.mtDueSort = 'priority';
  state.mtDueHideCompleted = true;
  renderMinhasTarefas();
}

// ==================== DE-PARA PADRÃO (no template do checklist) ====================
// O template guarda vínculos macroKey → tarefas do checklist (estáveis entre projetos).
// Estrutura de cada entrada: { macroKey, macroNameLabel, checklistTaskIds:[] }
let _deParaTplDraft = null; // { tplId, entradas:[...], selKey, selTaskIds:Set, dirty }

function modalDeParaTemplate(tplId) {
  const tpl = state.checklistTemplates.find(t=>t.id===tplId);
  if (!tpl) return;
  const entradas = JSON.parse(JSON.stringify(Array.isArray(tpl.deParaTemplate)?tpl.deParaTemplate:[]));
  _deParaTplDraft = { tplId, entradas, selKey: null, selTaskIds: new Set(), dirty: false };
  renderModalDeParaTemplate();
}

function renderModalDeParaTemplate() {
  if (!_deParaTplDraft) return;
  const tpl = state.checklistTemplates.find(t=>t.id===_deParaTplDraft.tplId);
  if (!tpl) return;
  const { entradas, selKey, selTaskIds } = _deParaTplDraft;
  const filtro = _deParaTplDraft.filtro || 'todas';

  // Mapa: taskId → entrada (a qual macroKey cada tarefa está vinculada)
  const taskToEntrada = {};
  entradas.forEach(e => (e.checklistTaskIds||[]).forEach(tid => { taskToEntrada[tid] = e; }));

  const entradaSel = entradas.find(e => e.macroKey === selKey);
  const tarefasDaKeySel = entradaSel ? new Set(entradaSel.checklistTaskIds||[]) : new Set();

  // ── ESQUERDA: macroKeys cadastradas ──
  const keyCards = entradas.map((e,i) => {
    const sel = selKey === e.macroKey;
    const n = (e.checklistTaskIds||[]).length;
    return `<div onclick="deParaTplSelKey('${e.macroKey.replace(/'/g,"\\'")}')" style="border:1px solid ${sel?'var(--accent)':'var(--gray-200)'};background:${sel?'var(--accent-light)':'#fff'};border-radius:8px;padding:10px 12px;cursor:pointer;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px">
        <div style="font-size:12px;font-weight:700;color:var(--gray-800);font-family:monospace">${e.macroKey}</div>
        <div style="display:flex;gap:4px;align-items:center">
          <span class="badge ${n>0?'badge-green':'badge-gray'}" style="font-size:9px">${n} tarefa${n!==1?'s':''}</span>
          <button class="btn btn-ghost btn-sm" style="color:var(--danger);padding:2px 5px" onclick="event.stopPropagation();deParaTplRemoverKey(${i})"><i class="ti ti-trash" style="font-size:12px"></i></button>
        </div>
      </div>
      ${e.macroNameLabel?`<div style="font-size:11px;color:var(--gray-500)">${e.macroNameLabel}</div>`:''}
      ${sel && n>0?`<div style="margin-top:6px;font-size:10px;color:var(--success);display:flex;align-items:center;gap:4px"><i class="ti ti-arrow-right" style="font-size:11px"></i> ${n} tarefa(s) desta macro destacada(s) à direita</div>`:''}
    </div>`;
  }).join('') || `<div style="padding:16px;text-align:center;color:var(--gray-400);font-size:12px">Nenhuma macroKey cadastrada ainda.</div>`;

  // ── DIREITA: tarefas do checklist (com filtro) ──
  let microList = tpl.tasks;
  if (filtro === 'vinculadas') microList = microList.filter(t => taskToEntrada[t.id]);
  else if (filtro === 'sem-vinculo') microList = microList.filter(t => !taskToEntrada[t.id]);
  if (entradaSel) microList = [...microList].sort((a,b)=>(tarefasDaKeySel.has(b.id)?1:0)-(tarefasDaKeySel.has(a.id)?1:0));

  const microRows = microList.map(t => {
    const eDe = taskToEntrada[t.id];
    const checked = selTaskIds.has(t.id);
    const daKeySel = tarefasDaKeySel.has(t.id);
    const tc = TEMA_COLORS[t.tema] || '#64748b';
    const bg = daKeySel ? 'background:#f0fdf4;border-left:3px solid var(--success)' : checked ? 'background:var(--accent-light);border-left:3px solid var(--accent)' : 'border-left:3px solid transparent';
    return `<tr style="${bg}">
      <td style="text-align:center"><input type="checkbox" class="task-check" ${checked?'checked':''} onchange="deParaTplToggleTask('${t.id}',this.checked)"></td>
      <td style="font-size:12px;font-weight:500">${daKeySel?`<i class="ti ti-link" style="font-size:12px;color:var(--success);vertical-align:-1px;margin-right:3px"></i>`:''}${t.tarefa}</td>
      <td style="font-size:11px;color:var(--gray-500);white-space:nowrap">${t.fase||'—'}</td>
      <td><span class="badge" style="background:${tc}18;color:${tc};font-size:10px">${t.tema||'—'}</span></td>
      <td style="font-size:11px;font-family:monospace">${eDe ? `<span style="color:var(--success)">${eDe.macroKey}</span>` : `<span style="color:var(--gray-300)">—</span>`}</td>
    </tr>`;
  }).join('') || `<tr><td colspan="5" style="padding:24px;text-align:center;color:var(--gray-400);font-size:13px">Nenhuma tarefa para este filtro.</td></tr>`;

  const totalTasks = tpl.tasks.length;
  const semVinc = tpl.tasks.filter(t=>!taskToEntrada[t.id]).length;
  const comVinc = totalTasks - semVinc;
  const btnFiltro = (val,label,n)=>`<button class="btn btn-sm ${filtro===val?'btn-primary':'btn-secondary'}" style="font-size:11px;padding:4px 10px" onclick="deParaTplSetFiltro('${val}')">${label} (${n})</button>`;

  openModal(`<div class="modal-header">
    <div class="modal-title"><i class="ti ti-arrows-exchange" style="margin-right:8px;color:var(--accent)"></i>DE-PARA padrão — ${tpl.nome}${_deParaTplDraft.dirty?' <span style="font-size:11px;color:var(--warn);font-weight:500">(não salvo)</span>':''}</div>
    <button class="btn btn-ghost" onclick="fecharDeParaTpl()"><i class="ti ti-x"></i></button>
  </div>
  <div class="modal-body" style="padding:16px">
    <div class="alert alert-info" style="margin-bottom:14px"><i class="ti ti-info-circle"></i> Vínculos padrão entre <strong>tipos de atividade macro</strong> (macroKey) e as tarefas do checklist. Ao importar um cronograma num projeto, esses vínculos são aplicados automaticamente pela macroKey.</div>

    <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
      <input class="form-input" id="novaMacroKey" placeholder="Nome ou macroKey (ex: Parametrização Geral Folha)" style="flex:1;min-width:220px">
      <button class="btn btn-secondary btn-sm" onclick="deParaTplAddKey()"><i class="ti ti-plus"></i> Adicionar macroKey</button>
      <div style="flex:1"></div>
      <span style="font-size:12px;color:var(--gray-500)"><strong style="color:var(--success)">${comVinc}</strong> vinculadas · <strong>${semVinc}</strong> sem vínculo</span>
    </div>

    <div style="display:grid;grid-template-columns:minmax(300px,1fr) 2fr;gap:16px;align-items:start">
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">Tipos de atividade macro (${entradas.length})</div>
        <div style="max-height:50vh;overflow-y:auto;padding-right:4px">${keyCards}</div>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px">
          <div style="font-size:12px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.4px">Tarefas do checklist</div>
          <div style="display:flex;gap:6px">${btnFiltro('todas','Todas',totalTasks)}${btnFiltro('vinculadas','Vinculadas',comVinc)}${btnFiltro('sem-vinculo','Sem vínculo',semVinc)}</div>
        </div>
        ${entradaSel?`<div style="font-size:11px;color:var(--success);margin-bottom:6px;display:flex;align-items:center;gap:4px"><i class="ti ti-info-circle" style="font-size:12px"></i> Linhas em verde já vinculadas a <strong style="font-family:monospace">${selKey}</strong></div>`:''}
        <div style="max-height:46vh;overflow-y:auto;border:1px solid var(--gray-200);border-radius:8px">
          <table style="width:100%;table-layout:auto">
            <thead style="position:sticky;top:0;z-index:1;background:var(--gray-50)"><tr>
              <th style="width:36px;text-align:center"><i class="ti ti-check"></i></th>
              <th>Tarefa</th><th>Fase</th><th>Tema</th><th>macroKey</th>
            </tr></thead>
            <tbody>${microRows}</tbody>
          </table>
        </div>
      </div>
    </div>

    <div style="margin-top:14px;padding:12px 14px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div style="font-size:12px;color:var(--gray-600)">
        ${selKey ? `macroKey selecionada: <strong style="font-family:monospace">${selKey}</strong>` : 'Selecione uma macroKey à esquerda'} · <strong>${selTaskIds.size}</strong> tarefa(s) marcada(s)
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-primary btn-sm" ${(!selKey||selTaskIds.size===0)?'disabled style="opacity:.5"':''} onclick="deParaTplVincular()"><i class="ti ti-link"></i> Vincular</button>
      <button class="btn btn-secondary btn-sm" ${selTaskIds.size===0?'disabled style="opacity:.5"':''} onclick="deParaTplRemoverVinculo()"><i class="ti ti-unlink"></i> Remover vínculo</button>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="fecharDeParaTpl()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarDeParaTpl()"><i class="ti ti-device-floppy"></i> Salvar DE-PARA padrão</button>
  </div>`, 'xl');
}

function deParaTplSetFiltro(val) {
  if (!_deParaTplDraft) return;
  _deParaTplDraft.filtro = val;
  renderModalDeParaTemplate();
}

function deParaTplAddKey() {
  if (!_deParaTplDraft) return;
  const inp = document.getElementById('novaMacroKey');
  const raw = (inp?.value||'').trim();
  if (!raw) return;
  const key = macroKeyUnicaTpl(gerarMacroKey(raw), _deParaTplDraft.entradas);
  _deParaTplDraft.entradas.push({ macroKey: key, macroNameLabel: raw !== key ? raw : '', checklistTaskIds: [] });
  _deParaTplDraft.selKey = key;
  _deParaTplDraft.dirty = true;
  renderModalDeParaTemplate();
}
function macroKeyUnicaTpl(base, entradas) {
  let key = base || 'ATIVIDADE';
  const existe = (k)=>entradas.some(e=>e.macroKey===k);
  if (!existe(key)) return key;
  let i=2; while(existe(key+'_'+i)) i++;
  return key+'_'+i;
}
function deParaTplSelKey(key) {
  if (!_deParaTplDraft) return;
  _deParaTplDraft.selKey = _deParaTplDraft.selKey === key ? null : key;
  renderModalDeParaTemplate();
}
function deParaTplToggleTask(tid, checked) {
  if (!_deParaTplDraft) return;
  if (checked) _deParaTplDraft.selTaskIds.add(tid); else _deParaTplDraft.selTaskIds.delete(tid);
  renderModalDeParaTemplate();
}
function deParaTplRemoverKey(i) {
  if (!_deParaTplDraft) return;
  if (!confirm('Remover esta macroKey e seus vínculos padrão?')) return;
  const removida = _deParaTplDraft.entradas[i];
  _deParaTplDraft.entradas.splice(i,1);
  if (_deParaTplDraft.selKey === removida.macroKey) _deParaTplDraft.selKey = null;
  _deParaTplDraft.dirty = true;
  renderModalDeParaTemplate();
}
function deParaTplVincular() {
  if (!_deParaTplDraft || !_deParaTplDraft.selKey || _deParaTplDraft.selTaskIds.size===0) return;
  const alvo = _deParaTplDraft.entradas.find(e=>e.macroKey===_deParaTplDraft.selKey);
  if (!alvo) return;
  _deParaTplDraft.selTaskIds.forEach(tid=>{
    // impede vínculo duplo: remove de outras entradas
    _deParaTplDraft.entradas.forEach(e=>{ if(e.macroKey!==alvo.macroKey) e.checklistTaskIds=(e.checklistTaskIds||[]).filter(x=>x!==tid); });
    if (!alvo.checklistTaskIds) alvo.checklistTaskIds=[];
    if (!alvo.checklistTaskIds.includes(tid)) alvo.checklistTaskIds.push(tid);
  });
  _deParaTplDraft.selTaskIds.clear();
  _deParaTplDraft.dirty = true;
  renderModalDeParaTemplate();
}
function deParaTplRemoverVinculo() {
  if (!_deParaTplDraft || _deParaTplDraft.selTaskIds.size===0) return;
  _deParaTplDraft.selTaskIds.forEach(tid=>{
    _deParaTplDraft.entradas.forEach(e=>{ e.checklistTaskIds=(e.checklistTaskIds||[]).filter(x=>x!==tid); });
  });
  _deParaTplDraft.selTaskIds.clear();
  _deParaTplDraft.dirty = true;
  renderModalDeParaTemplate();
}
function salvarDeParaTpl() {
  if (!_deParaTplDraft) return;
  const tpl = state.checklistTemplates.find(t=>t.id===_deParaTplDraft.tplId);
  if (!tpl) return;
  // Mantém só entradas com macroKey; limpa vínculos vazios? Não — permite macroKey sem tarefa ainda.
  tpl.deParaTemplate = _deParaTplDraft.entradas.filter(e=>e.macroKey).map(e=>({
    macroKey: e.macroKey,
    macroNameLabel: e.macroNameLabel || '',
    checklistTaskIds: Array.isArray(e.checklistTaskIds)?[...e.checklistTaskIds]:[]
  }));
  saveState();
  _deParaTplDraft = null;
  closeModal();
  renderChecklists();
  setTimeout(()=>alert('DE-PARA padrão salvo no template.'), 100);
}
function fecharDeParaTpl() {
  if (_deParaTplDraft && _deParaTplDraft.dirty) {
    if (!confirm('Há alterações não salvas. Descartar?')) return;
  }
  _deParaTplDraft = null;
  closeModal();
}

// ==================== CHECKLISTS ====================
function renderChecklists() {
  if (!isGestor()) { nav('dashboard'); return; }
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-primary" onclick="modalNovoChecklist()"><i class="ti ti-plus"></i> Novo template</button>`;

  const tpls = state.checklistTemplates;
  document.getElementById('page-content').innerHTML = `
    <div class="alert alert-info"><i class="ti ti-info-circle"></i> Templates de checklist são aplicados automaticamente quando um novo projeto é criado.</div>
    ${tpls.length === 0 ? `<div class="card"><div class="empty"><i class="ti ti-checklist"></i><p>Nenhum template cadastrado</p></div></div>` :
      tpls.map(tpl => `<div class="card" style="margin-bottom:16px">
        <div class="card-header">
          <div>
            <div class="card-title">${tpl.nome}</div>
            <div style="font-size:12px;color:var(--gray-500);margin-top:2px">${tpl.descricao||''} · ${tpl.tasks.length} tarefas${(tpl.deParaTemplate&&tpl.deParaTemplate.length)?` · ${tpl.deParaTemplate.length} vínculo(s) DE-PARA`:''}</div>
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary btn-sm" onclick="expandirChecklist('${tpl.id}')"><i class="ti ti-eye"></i> Ver tarefas</button>
            <button class="btn btn-secondary btn-sm" onclick="modalDeParaTemplate('${tpl.id}')"><i class="ti ti-arrows-exchange"></i> DE-PARA padrão</button>
            <button class="btn btn-secondary btn-sm" onclick="modalEditarChecklist('${tpl.id}')"><i class="ti ti-edit"></i> Editar</button>
            <button class="btn btn-secondary btn-sm" onclick="modalAdicionarTarefaChecklist('${tpl.id}')"><i class="ti ti-plus"></i> Tarefa</button>
          </div>
        </div>
        <div id="cl-${tpl.id}" class="hidden">
          <hr class="divider">
          ${renderChecklistTasks(tpl)}
        </div>
      </div>`).join('')}`;
}

function renderChecklistTasks(tpl) {
  const byFase = {};
  tpl.tasks.forEach(t => { if(!byFase[t.fase]) byFase[t.fase]=[]; byFase[t.fase].push(t); });
  return Object.entries(byFase).map(([fase, ts]) => {
    const fc = FASE_COLORS[fase]||{bg:'#f1f5f9',color:'#64748b'};
    return `<div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;padding:6px 12px;border-radius:6px;background:${fc.bg};color:${fc.color};margin-bottom:8px;display:inline-block">${fase}</div>
      <table style="width:100%">
        <thead><tr><th>Tarefa</th><th>Tema</th><th>Responsável</th><th>Esforço</th><th style="width:80px"></th></tr></thead>
        <tbody>
          ${ts.map(t => `<tr>
            <td style="cursor:pointer;font-weight:500" onclick="modalEditarTarefaChecklist('${tpl.id}','${t.id}')">${t.tarefa} ${helpIconHTML(t)}</td>
            <td><span class="badge" style="background:${(TEMA_COLORS[t.tema]||'#64748b')}18;color:${TEMA_COLORS[t.tema]||'#64748b'}">${t.tema}</span></td>
            <td style="font-size:12px">${t.responsavel||'—'}</td>
            <td style="font-size:12px">${t.esforco||'—'}</td>
            <td>
              <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="removerTarefaChecklist('${tpl.id}','${t.id}')"><i class="ti ti-trash"></i></button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }).join('');
}

function expandirChecklist(id) {
  const el = document.getElementById('cl-'+id);
  if (el) el.classList.toggle('hidden');
}

function modalNovoChecklist() {
  openModal(`<div class="modal-header">
    <div class="modal-title">Novo template de checklist</div>
    <button class="btn btn-ghost" onclick="closeModal()"><i class="ti ti-x"></i></button>
  </div>
  <div class="modal-body">
    <div class="form-group"><label class="form-label">Nome do template *</label><input class="form-input" id="clNome" placeholder="Ex: Checklist Padrão v2"></div>
    <div class="form-group"><label class="form-label">Descrição</label><input class="form-input" id="clDesc" placeholder="Breve descrição do template"></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarChecklist()"><i class="ti ti-check"></i> Criar</button>
  </div>`);
}

function salvarChecklist(editId) {
  const nome = document.getElementById('clNome').value.trim();
  if (!nome) return alert('Nome é obrigatório');
  if (editId) {
    const tpl = state.checklistTemplates.find(t=>t.id===editId);
    tpl.nome = nome; tpl.descricao = document.getElementById('clDesc').value;
  } else {
    state.checklistTemplates.push({id:uid(), nome, descricao: document.getElementById('clDesc').value, tasks:[]});
  }
  saveState(); closeModal(); renderChecklists();
}

function modalEditarChecklist(id) {
  const tpl = state.checklistTemplates.find(t=>t.id===id);
  openModal(`<div class="modal-header">
    <div class="modal-title">Editar template</div>

  </div>
  <div class="modal-body">
    <div class="form-group"><label class="form-label">Nome *</label><input class="form-input" id="clNome" value="${tpl.nome}"></div>

    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarChecklist('${id}')"><i class="ti ti-check"></i> Salvar</button>
  </div>`);
}

function modalAdicionarTarefaChecklist(tplId) {
  const fases = Object.keys(FASE_COLORS);
  const temas = Object.keys(TEMA_COLORS);
  openModal(`<div class="modal-header">
    <div class="modal-title">Adicionar tarefa ao checklist</div>
    <button class="btn btn-ghost" onclick="closeModal()"><i class="ti ti-x"></i></button>
  </div>
  <div class="modal-body">
    <div class="form-group"><label class="form-label">Tarefa *</label><input class="form-input" id="ctTarefa" placeholder="Nome da tarefa"></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Fase</label>
        <select class="form-input form-select" id="ctFase">${fases.map(f=>`<option>${f}</option>`).join('')}</select></div>

        <select class="form-input form-select" id="ctTema">${temas.map(t=>`<option>${t}</option>`).join('')}</select></div>
    </div>

      <div class="form-group"><label class="form-label">Responsável padrão</label><input class="form-input" id="ctResp" placeholder="Ex: Consultor, Analista"></div>
      <div class="form-group"><label class="form-label">Esforço estimado</label><input class="form-input" id="ctEsforco" placeholder="Ex: 4 horas"></div>
    </div>
    <div class="form-group"><label class="form-label">Help / Orientação</label>
      <textarea class="form-input form-textarea" id="ctHelp" placeholder="Descreva o objetivo e o procedimento desta tarefa..."></textarea></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarTarefaChecklist('${tplId}')"><i class="ti ti-check"></i> Adicionar</button>
  </div>`);
}

function salvarTarefaChecklist(tplId, editId) {
  const tarefa = document.getElementById('ctTarefa').value.trim();
  if (!tarefa) return alert('Descreva a tarefa');
  const tpl = state.checklistTemplates.find(t=>t.id===tplId);
  const data = {
    tarefa, fase: document.getElementById('ctFase').value,
    tema: document.getElementById('ctTema').value,
    responsavel: document.getElementById('ctResp').value,
    esforco: document.getElementById('ctEsforco').value,
    help: document.getElementById('ctHelp').value, status:'pendente'
  };
  if (editId) {
    const t = tpl.tasks.find(x=>x.id===editId);
    Object.assign(t, data);
  } else {
    tpl.tasks.push({...data, id:uid()});
  }
  saveState(); closeModal(); renderChecklists();
}

function modalEditarTarefaChecklist(tplId, taskId) {
  const tpl = state.checklistTemplates.find(t=>t.id===tplId);
  const t = tpl?.tasks?.find(x=>x.id===taskId);
  if (!t) return;
  const fases = Object.keys(FASE_COLORS);
  const temas = Object.keys(TEMA_COLORS);
  openModal(`<div class="modal-header">
    <div class="modal-title">Editar tarefa</div>
    <button class="btn btn-ghost" onclick="closeModal()"><i class="ti ti-x"></i></button>

// ==================== USUARIOS ====================

// ==================== MATRIZ DE ALOCAÇÃO — MOTOR ====================
// Reutiliza consultor/analista dos projetos como vínculos, sem criar estrutura persistida.

// Datas YYYY-MM-DD interpretadas como locais (evita deslocamento por fuso)
function parseLocalDate(dateString) {
  if (!dateString || typeof dateString !== 'string') return null;
  const parts = dateString.split('-').map(Number);
  if (parts.length !== 3 || parts.some(isNaN)) return null;
  const [y, m, d] = parts;
  return new Date(y, m - 1, d);
}
function _hojeLocal() { const d = new Date(); d.setHours(0,0,0,0); return d; }

function dateRangesOverlap(startA, endA, startB, endB) {
  if (!startA || !endA || !startB || !endB) return false;
  return startA <= endB && startB <= endA;
}
function projectOverlapsMonth(project, year, month) {
  const start = parseLocalDate(project.dataInicio);
  const end = parseLocalDate(project.goLive);
  if (!start || !end) return false;
  const mStart = new Date(year, month, 1);
  const mEnd = new Date(year, month + 1, 0);
  return dateRangesOverlap(start, end, mStart, mEnd);
}
function isProjectActiveOnDate(project, referenceDate) {
  const start = parseLocalDate(project.dataInicio);
  const end = parseLocalDate(project.goLive);
  if (!start || !end) return false;
  return start <= referenceDate && referenceDate <= end;
}

// Normaliza nome para relacionar consultor/analista/usuário
function normalizePersonName(value) {
  return String(value || '').trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,' ');
}

// Junta os vínculos consultor+analista de UM projeto (mesma pessoa nos 2 campos = 1 vínculo)
function mergeProjectPersonLinks(project) {
  const links = [];
  const consultor = (project.consultor || '').trim();
  const analista = (project.analista || '').trim();
  const kC = normalizePersonName(consultor);
  const kA = normalizePersonName(analista);
  const add = (nome, papel) => {
    links.push({ personKey: normalizePersonName(nome), personNameRaw: nome, roleInProject: papel });
  };
  if (consultor && analista && kC === kA) {
    add(consultor, 'consultor-analista');
  } else {
    if (consultor) add(consultor, 'consultor');
    if (analista) add(analista, 'analista');
  }
  return links;
}

// Consolida todos os vínculos de todos os projetos (calculado em memória)
function getProjectAllocationLinks() {
  const links = [];
  (state.projetos || []).forEach(project => {
    const phase = getProjectCurrentPhase(project);
    const progress = calculateProjectProgress(project);
    const status = getProjectExecutiveStatus(project);
    const riskSummary = calculateProjectRiskSummary(project);
    const blockers = getActiveGoLiveBlockers(project).length;
    mergeProjectPersonLinks(project).forEach(pl => {
      const user = (state.users || []).find(u => normalizePersonName(u.name) === pl.personKey);
      links.push({
        id: uid(),
        personKey: pl.personKey,
        userId: user ? user.id : null,
        personName: user ? user.name : pl.personNameRaw,
        userType: user ? (user.tipo || '') : '',
        projectId: project.id,
        projectName: project.nome,
        clientName: project.cliente || '',
        roleInProject: pl.roleInProject,
        startDate: project.dataInicio || null,
        endDate: project.goLive || null,
        modules: Array.isArray(project.modulos) ? project.modulos : [],
        currentPhase: phase,
        projectProgress: progress,
        projectStatus: status,
        riskSummary: riskSummary,
        activeBlockers: blockers,
        _project: project
      });
    });
  });
  return links;
}

// Status de um vínculo (prioridade: vencido→terminando→ativo→futuro→concluído→sem datas)
function getAllocationLinkStatus(link, referenceDate) {
  const hoje = referenceDate || _hojeLocal();
  const start = parseLocalDate(link.startDate);
  const end = parseLocalDate(link.endDate);
  const concluido = link.projectProgress && link.projectProgress.percent === 100;

  if (concluido) return { key:'completed', label:'Projeto concluído', badgeClass:'badge-gray' };
  if (!start || !end) return { key:'undated', label:'Período não informado', badgeClass:'badge-gray' };
  if (start > hoje) return { key:'future', label:'Planejado', badgeClass:'badge-blue' };
  if (end < hoje) return { key:'expired', label:'Go-live vencido', badgeClass:'badge-red' };
  // ativo: verifica se termina em breve (30 dias)
  const dl = Math.round((end - hoje) / 86400000);
  if (dl >= 0 && dl <= 30) return { key:'ending-soon', label:'Termina em breve', badgeClass:'badge-warn' };
  return { key:'active', label:'Ativo', badgeClass:'badge-green' };
}

// Conta projetos distintos ativos numa data (não conta 2x a mesma pessoa/projeto)
function countSimultaneousProjects(personLinks, referenceDate) {
  const ativos = new Set();
  personLinks.forEach(l => {
    if (isProjectActiveOnDate(l._project, referenceDate)) ativos.add(l.projectId);
  });
  return ativos.size;
}

// Concorrência mensal (quantos projetos se sobrepõem em cada mês do intervalo)
function calculatePersonProjectConcurrency(personLinks, startDate, endDate) {
  const monthlyCounts = [];
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  let cur = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  const fim = new Date(endDate.getFullYear(), endDate.getMonth(), 1);
  while (cur <= fim) {
    const y = cur.getFullYear(), m = cur.getMonth();
    const ids = [];
    personLinks.forEach(l => { if (projectOverlapsMonth(l._project, y, m) && !ids.includes(l.projectId)) ids.push(l.projectId); });
    monthlyCounts.push({ periodKey: `${y}-${String(m+1).padStart(2,'0')}`, label: `${meses[m]}/${y}`, projectCount: ids.length, projectIds: ids });
    cur.setMonth(cur.getMonth() + 1);
  }
  const peakCount = monthlyCounts.reduce((mx, mc) => Math.max(mx, mc.projectCount), 0);
  const peakPeriods = monthlyCounts.filter(mc => mc.projectCount === peakCount && peakCount > 0);
  const hoje = _hojeLocal();
  const currentCount = countSimultaneousProjects(personLinks, hoje);
  return { currentCount, peakCount, peakPeriods, monthlyCounts };
}

// Resumo de alocação de uma pessoa
function calculatePersonAllocationSummary(person, links) {
  const hoje = _hojeLocal();
  const personLinks = links.filter(l => l.personKey === person.personKey);
  let activeProjects = 0, futureProjects = 0, completedProjects = 0, projectsEndingSoon = 0, projectsWithoutDates = 0, ongoingOverdueProjects = 0;
  const endDatesEmAberto = []; // para lastExpectedEndDate
  const nextEnds = []; // próximos términos (ativos)
  const projetosVistos = new Set();

  personLinks.forEach(l => {
    if (projetosVistos.has(l.projectId)) return; // não conta 2x mesmo projeto
    projetosVistos.add(l.projectId);
    const st = getAllocationLinkStatus(l, hoje);
    const start = parseLocalDate(l.startDate);
    const end = parseLocalDate(l.endDate);
    const concluido = l.projectProgress && l.projectProgress.percent === 100;
    if (concluido) { completedProjects++; return; }
    if (!start || !end) { projectsWithoutDates++; return; }
    if (st.key === 'future') { futureProjects++; endDatesEmAberto.push(end); }
    else if (st.key === 'expired') { ongoingOverdueProjects++; endDatesEmAberto.push(end); }
    else { // active ou ending-soon
      activeProjects++;
      endDatesEmAberto.push(end);
      nextEnds.push(end);
      if (st.key === 'ending-soon') projectsEndingSoon++;
    }
  });

  const firstStarts = personLinks.map(l => parseLocalDate(l.startDate)).filter(Boolean);
  const firstStartDate = firstStarts.length ? new Date(Math.min(...firstStarts.map(d=>d.getTime()))) : null;
  const lastExpectedEndDate = endDatesEmAberto.length ? new Date(Math.max(...endDatesEmAberto.map(d=>d.getTime()))) : null;
  const nextProjectEndDate = nextEnds.length ? new Date(Math.min(...nextEnds.map(d=>d.getTime()))) : null;
  const simultaneousProjectsToday = countSimultaneousProjects(personLinks, hoje);

  // papel consolidado
  const papeis = new Set(personLinks.map(l => l.roleInProject));
  let role = '—';
  if (papeis.has('consultor-analista') || (papeis.has('consultor') && papeis.has('analista'))) role = 'Consultor e Analista';
  else if (papeis.has('consultor')) role = 'Consultor';
  else if (papeis.has('analista')) role = 'Analista';
  else if (person.userType) role = person.userType.charAt(0).toUpperCase() + person.userType.slice(1);

  return {
    personKey: person.personKey, userId: person.userId, personName: person.personName,
    userType: person.userType, role,
    totalProjects: projetosVistos.size,
    activeProjects, futureProjects, completedProjects, projectsEndingSoon, projectsWithoutDates,
    firstStartDate, lastExpectedEndDate, nextProjectEndDate,
    ongoingOverdueProjects, simultaneousProjectsToday,
    openProjects: activeProjects + futureProjects + ongoingOverdueProjects,
    links: personLinks
  };
}

// Lista de pessoas da matriz: usuários consultor/analista + quem aparecer nos projetos
function getAllocationMatrixPeople() {
  const map = new Map();
  // usuários consultor/analista (mesmo sem projeto)
  (state.users || []).forEach(u => {
    const tipo = (u.tipo || '').toLowerCase();
    if (tipo === 'consultor' || tipo === 'analista') {
      const key = normalizePersonName(u.name);
      map.set(key, { personKey: key, userId: u.id, personName: u.name, userType: tipo });
    }
  });
  // pessoas que aparecem nos projetos mas não estão em users (ou são de outro tipo)
  getProjectAllocationLinks().forEach(l => {
    if (!map.has(l.personKey)) {
      map.set(l.personKey, { personKey: l.personKey, userId: l.userId, personName: l.personName, userType: l.userType || 'outros' });
    }
  });
  return [...map.values()];
}

// ==================== MATRIZ DE ALOCAÇÃO — FILTROS ====================
function normalizeAllocationMatrixFilters() {
  if (!state.allocationMatrixFilters || typeof state.allocationMatrixFilters !== 'object') state.allocationMatrixFilters = {};
  const f = state.allocationMatrixFilters;
  ['search','personType','module','projectStatus','periodStart','periodEnd'].forEach(k => { if (typeof f[k] !== 'string') f[k] = ''; });
  if (typeof f.onlyActive !== 'boolean') f.onlyActive = false;
  if (typeof f.onlyEndingSoon !== 'boolean') f.onlyEndingSoon = false;
  if (typeof f.onlyWithoutDates !== 'boolean') f.onlyWithoutDates = false;
  return f;
}
function allocationMatrixSetFilter(key, value) {
  normalizeAllocationMatrixFilters();
  state.allocationMatrixFilters[key] = value;
  renderAllocationMatrix();
}
function clearAllocationMatrixFilters() {
  state.allocationMatrixFilters = { search:'', personType:'', module:'', projectStatus:'', periodStart:'', periodEnd:'', onlyActive:false, onlyEndingSoon:false, onlyWithoutDates:false };
  renderAllocationMatrix();
}
function setAllocationMatrixView(view) {
  state.allocationMatrixView = view;
  renderAllocationMatrix();
}

// Aplica os filtros e devolve pessoas + resumos + links filtrados
function getFilteredAllocationMatrixData() {
  const f = normalizeAllocationMatrixFilters();
  const busca = _normTxt(f.search || '');
  const allLinks = getProjectAllocationLinks();
  let people = getAllocationMatrixPeople();

  // filtro por tipo de pessoa
  if (f.personType) {
    people = people.filter(p => {
      const t = (p.userType || 'outros').toLowerCase();
      if (f.personType === 'outros') return t !== 'consultor' && t !== 'analista' && t !== 'gestor';
      return t === f.personType;
    });
  } else {
    // visão padrão: consultores e analistas (mais quem aparecer nos projetos)
    // (não filtra gestores explicitamente aqui pois getAllocationMatrixPeople já limita usuários a consultor/analista)
  }

  const hoje = _hojeLocal();
  const summaries = people.map(person => {
    // aplica filtros de vínculo/projeto sobre os links da pessoa
    let personLinks = allLinks.filter(l => l.personKey === person.personKey);
    if (f.module) personLinks = personLinks.filter(l => l.modules.includes(f.module));
    if (f.projectStatus) personLinks = personLinks.filter(l => l.projectStatus.key === f.projectStatus);
    if (f.periodStart || f.periodEnd) {
      const ps = f.periodStart ? parseLocalDate(f.periodStart) : new Date(1900,0,1);
      const pe = f.periodEnd ? parseLocalDate(f.periodEnd) : new Date(2999,11,31);
      personLinks = personLinks.filter(l => { const s=parseLocalDate(l.startDate), e=parseLocalDate(l.endDate); return s&&e&&dateRangesOverlap(s,e,ps,pe); });
    }
    if (f.onlyActive) personLinks = personLinks.filter(l => { const k=getAllocationLinkStatus(l,hoje).key; return k==='active'||k==='ending-soon'; });
    if (f.onlyEndingSoon) personLinks = personLinks.filter(l => getAllocationLinkStatus(l,hoje).key==='ending-soon');
    if (f.onlyWithoutDates) personLinks = personLinks.filter(l => !parseLocalDate(l.startDate) || !parseLocalDate(l.endDate));
    const summary = calculatePersonAllocationSummary(person, personLinks.length||f.module||f.projectStatus||f.periodStart||f.periodEnd||f.onlyActive||f.onlyEndingSoon||f.onlyWithoutDates ? personLinks : allLinks.filter(l=>l.personKey===person.personKey));
    return { person, summary, _filteredLinks: personLinks };
  });

  // busca textual (pessoa, projeto, cliente)
  let resultado = summaries;
  if (busca) {
    resultado = summaries.filter(({person, summary}) => {
      if (_normTxt(person.personName).includes(busca)) return true;
      return summary.links.some(l => _normTxt(l.projectName).includes(busca) || _normTxt(l.clientName).includes(busca));
    });
  }
  // se há filtros de vínculo, oculta pessoas sem nenhum link após filtro (exceto quando busca vazia e sem filtros)
  const temFiltroVinculo = f.module||f.projectStatus||f.periodStart||f.periodEnd||f.onlyActive||f.onlyEndingSoon||f.onlyWithoutDates;
  if (temFiltroVinculo) resultado = resultado.filter(({_filteredLinks}) => _filteredLinks.length > 0);

  return { data: resultado, allLinks, filters: f };
}

// ==================== INDICADORES ====================
function renderAllocationMatrixIndicators(data, allLinks) {
  const hoje = _hojeLocal();
  const pessoasVinculadas = data.filter(({summary}) => summary.links.length > 0).length;
  const semProjetoAtivo = data.filter(({summary}) => summary.activeProjects === 0 && (summary.person?.userType==='consultor'||summary.person?.userType==='analista'||summary.summary)).length;
  // recomputa sem-projeto-ativo corretamente
  const semAtivoHoje = data.filter(({summary}) => summary.simultaneousProjectsToday === 0).length;
  const vinculosAtivos = allLinks.filter(l => { const k=getAllocationLinkStatus(l,hoje).key; return k==='active'||k==='ending-soon'; }).length;
  const terminando = allLinks.filter(l => getAllocationLinkStatus(l,hoje).key==='ending-soon').length;
  const semPeriodo = allLinks.filter(l => !parseLocalDate(l.startDate) || !parseLocalDate(l.endDate)).length;
  const maiorSimultaneo = data.reduce((mx,{summary}) => Math.max(mx, summary.simultaneousProjectsToday), 0);

  const card = (icon,bg,color,label,value,sub) => `<div class="stat-card"><div class="stat-icon" style="background:${bg}"><i class="ti ${icon}" style="color:${color}"></i></div><div><div class="stat-label">${label}</div><div class="stat-value">${value}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div></div>`;
  return `<div class="stats-grid" style="margin-bottom:16px">
    ${card('ti-users','#e8f0fe','var(--accent)','Pessoas vinculadas',pessoasVinculadas)}
    ${card('ti-user-off','#f1f5f9','var(--gray-500)','Sem projeto ativo hoje',semAtivoHoje)}
    ${card('ti-plug-connected','#dcfce7','var(--success)','Vínculos ativos',vinculosAtivos)}
    ${card('ti-clock-exclamation','#fef3c7','var(--warn)','Terminando em 30 dias',terminando)}
    ${card('ti-calendar-off','#f1f5f9','var(--gray-500)','Vínculos sem período',semPeriodo)}
    ${card('ti-layers-intersect','#e8f0fe','var(--accent)','Maior nº simultâneo',maiorSimultaneo,'Concentração atual entre as pessoas')}
  </div>`;
}

      <select class="filter-select" onchange="allocationMatrixSetFilter('module',this.value)"><option value="">Todo módulo</option>${PROJECT_MODULE_OPTIONS.map(m=>`<option value="${m}" ${f.module===m?'selected':''}>${m}</option>`).join('')}</select>
      <select class="filter-select" onchange="allocationMatrixSetFilter('projectStatus',this.value)">${statusOpts.map(([k,l])=>`<option value="${k}" ${f.projectStatus===k?'selected':''}>${l}</option>`).join('')}</select>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gray-600);cursor:pointer;white-space:nowrap"><input type="checkbox" ${f.onlyActive?'checked':''} onchange="allocationMatrixSetFilter('onlyActive',this.checked)"> Só ativos</label>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gray-600);cursor:pointer;white-space:nowrap"><input type="checkbox" ${f.onlyEndingSoon?'checked':''} onchange="allocationMatrixSetFilter('onlyEndingSoon',this.checked)"> Terminando em 30d</label>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gray-600);cursor:pointer;white-space:nowrap"><input type="checkbox" ${f.onlyWithoutDates?'checked':''} onchange="allocationMatrixSetFilter('onlyWithoutDates',this.checked)"> Sem datas</label>
      ${temFiltro?`<button class="btn btn-ghost btn-sm" onclick="clearAllocationMatrixFilters()"><i class="ti ti-x"></i> Limpar filtros</button>`:''}
    </div>
  </div>`;
}

// ==================== ROTEADOR PRINCIPAL ====================
function renderAllocationMatrix() {
  if (!isGestor()) { nav('dashboard'); return; }
  normalizeAllocationMatrixFilters();
  if (!state.allocationMatrixView) state.allocationMatrixView = 'people';
  document.getElementById('topbar-actions').innerHTML = '';
  const page = document.getElementById('page-content');

  const users = state.users || [];
  const temCA = users.some(u => ['consultor','analista'].includes((u.tipo||'').toLowerCase()));
  if (!temCA && (!state.projetos || !state.projetos.length)) {
    page.innerHTML = `<div class="card"><div class="empty"><i class="ti ti-calendar-user"></i><p>Nenhum consultor ou analista cadastrado.</p><small>Cadastre usuários e vincule-os a projetos para acompanhar a alocação.</small></div></div>`;
    return;
  }

  const { data, allLinks } = getFilteredAllocationMatrixData();

  const tabs = `<div class="tabs" style="margin-bottom:16px">
    <button class="tab ${state.allocationMatrixView==='people'?'active':''}" onclick="setAllocationMatrixView('people')"><i class="ti ti-users"></i> Visão por pessoa</button>
    <button class="tab ${state.allocationMatrixView==='timeline'?'active':''}" onclick="setAllocationMatrixView('timeline')"><i class="ti ti-timeline"></i> Linha do tempo</button>
    <button class="tab ${state.allocationMatrixView==='projects'?'active':''}" onclick="setAllocationMatrixView('projects')"><i class="ti ti-folder"></i> Visão por projeto</button>
  </div>`;

  const indicadores = renderAllocationMatrixIndicators(data, allLinks);
  const filtros = renderAllocationMatrixFilters();

  let corpo;
  if (data.length === 0 && state.allocationMatrixView !== 'projects') {
    corpo = `<div class="card"><div class="empty"><i class="ti ti-search-off"></i><p>Nenhuma pessoa ou projeto corresponde aos filtros selecionados.</p><small><button class="btn btn-secondary btn-sm" onclick="clearAllocationMatrixFilters()"><i class="ti ti-x"></i> Limpar filtros</button></small></div></div>`;
  } else if (state.allocationMatrixView === 'people') {
    corpo = renderAllocationPeopleView(data);
  } else if (state.allocationMatrixView === 'timeline') {
    corpo = renderAllocationTimelineView(data);
  } else {
    corpo = renderAllocationProjectsView();
  }

  page.innerHTML = tabs + indicadores + filtros + corpo;
}

// ==================== VISÃO POR PESSOA ====================
function _allocSituacaoInformativa(summary) {
  // prioridade: vencido em andamento → sem datas → terminando → com ativos → sem ativo
  if (summary.ongoingOverdueProjects > 0) return { label:'Projeto vencido em andamento', badge:'badge-red' };
  if (summary.projectsWithoutDates > 0) return { label:'Possui vínculo sem datas', badge:'badge-gray' };
  if (summary.projectsEndingSoon > 0) return { label:'Projetos terminando em breve', badge:'badge-warn' };
  if (summary.activeProjects > 0) return { label:'Com projetos ativos', badge:'badge-green' };
  return { label:'Sem projeto ativo', badge:'badge-gray' };
}
function _iniciais(nome) { return (nome||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

// ==================== LINHA DO TEMPO ====================
function renderAllocationTimelineView(data) {
  // Período: allocationMatrixTimelineStart ou mês atual, + 5 meses (6 colunas)
  let base;
  if (state.allocationMatrixTimelineStart) { const [y,m]=state.allocationMatrixTimelineStart.split('-').map(Number); base=new Date(y,m-1,1); }
  else { const h=_hojeLocal(); base=new Date(h.getFullYear(),h.getMonth(),1); }
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const cols = [];
  for (let i=0;i<6;i++){ const d=new Date(base.getFullYear(),base.getMonth()+i,1); cols.push({y:d.getFullYear(),m:d.getMonth(),label:`${meses[d.getMonth()]}/${String(d.getFullYear()).slice(2)}`}); }

  const corConcentracao = n => n===0?'#f8fafc':n===1?'#eff6ff':n===2?'#dbeafe':n===3?'#fef9c3':'#ffedd5';
  const corTexto = n => n===0?'#cbd5e1':n>=3?'#92400e':'#1e40af';

  const navBtns = `<div style="display:flex;gap:6px;align-items:center;margin-bottom:12px">
    <button class="btn btn-secondary btn-sm" onclick="allocTimelineShift(-1)"><i class="ti ti-chevron-left"></i></button>
    <span style="font-size:13px;font-weight:600;color:var(--gray-700)">${cols[0].label} — ${cols[5].label}</span>
    <button class="btn btn-secondary btn-sm" onclick="allocTimelineShift(1)"><i class="ti ti-chevron-right"></i></button>
    <button class="btn btn-ghost btn-sm" onclick="allocTimelineReset()">Hoje</button>
  </div>`;

  const linhas = data.map(({person, summary}) => {
    const personLinks = summary.links;
    const semData = personLinks.filter(l => !parseLocalDate(l.startDate) || !parseLocalDate(l.endDate));
    const semDataTip = semData.map(l=>l.projectName).join(', ');
    const celulas = cols.map(c => {
      const ids=[]; const projs=[];
      personLinks.forEach(l => { if (projectOverlapsMonth(l._project,c.y,c.m) && !ids.includes(l.projectId)){ids.push(l.projectId);projs.push(l);} });
      const n = ids.length;
      const tip = n>0 ? `${c.label}\n\n${projs.map(l=>`${l.projectName} — Go-live ${l.endDate?fmt(l.endDate):'—'}`).join('\n')}` : `${c.label}: sem projetos`;
      return `<td style="text-align:center;padding:4px"><div title="${tip.replace(/"/g,'&quot;')}" style="background:${corConcentracao(n)};color:${corTexto(n)};border-radius:6px;padding:8px 4px;font-size:13px;font-weight:700;min-width:44px">${n>0?n:'·'}</div></td>`;
    }).join('');
    return `<tr>
      <td style="position:sticky;left:0;background:#fff;z-index:1"><div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px;font-weight:600;color:var(--gray-800);cursor:pointer" onclick="showPersonAllocationMatrixDetails('${person.personKey}')">${person.personName}</span>${semData.length?`<i class="ti ti-alert-triangle" style="color:var(--warn);font-size:13px" title="Vínculos sem período: ${semDataTip.replace(/"/g,'&quot;')}"></i>`:''}</div></td>
      ${celulas}
    </tr>`;
  }).join('');

  const legenda = `<div style="display:flex;gap:14px;align-items:center;margin-top:12px;flex-wrap:wrap;font-size:11px;color:var(--gray-500)">
    <span>Concentração de projetos:</span>
    ${[['0','#f8fafc'],['1','#eff6ff'],['2','#dbeafe'],['3','#fef9c3'],['4+','#ffedd5']].map(([l,c])=>`<span style="display:inline-flex;align-items:center;gap:4px"><span style="width:16px;height:16px;background:${c};border:1px solid var(--gray-200);border-radius:4px;display:inline-block"></span>${l}</span>`).join('')}
    <span style="color:var(--gray-400)">A cor indica apenas concentração — não capacidade ou sobrecarga.</span>
  </div>`;

  return `<div class="card">${navBtns}<div style="overflow-x:auto"><table style="width:100%;min-width:560px">
    <thead><tr><th style="position:sticky;left:0;background:var(--gray-50);z-index:2">Pessoa</th>${cols.map(c=>`<th style="text-align:center">${c.label}</th>`).join('')}</tr></thead>
    <tbody>${linhas}</tbody>
  </table></div>${legenda}</div>`;
}
function allocTimelineShift(delta) {
  let base;
  if (state.allocationMatrixTimelineStart){const [y,m]=state.allocationMatrixTimelineStart.split('-').map(Number);base=new Date(y,m-1,1);}
  else {const h=_hojeLocal();base=new Date(h.getFullYear(),h.getMonth(),1);}
  base.setMonth(base.getMonth()+delta);
  state.allocationMatrixTimelineStart = `${base.getFullYear()}-${String(base.getMonth()+1).padStart(2,'0')}`;
  renderAllocationMatrix();
}
function allocTimelineReset() { state.allocationMatrixTimelineStart = null; renderAllocationMatrix(); }

// ==================== VISÃO POR PROJETO ====================
function renderAllocationProjectsView() {
  const f = state.allocationMatrixFilters;
  let projetos = (state.projetos || []);
  // aplica filtros compatíveis
  const busca = _normTxt(f.search||'');
  if (busca) projetos = projetos.filter(p => _normTxt(p.nome).includes(busca)||_normTxt(p.cliente||'').includes(busca)||_normTxt(p.consultor||'').includes(busca)||_normTxt(p.analista||'').includes(busca));
  if (f.module) projetos = projetos.filter(p => Array.isArray(p.modulos)&&p.modulos.includes(f.module));
  if (f.projectStatus) projetos = projetos.filter(p => getProjectExecutiveStatus(p).key===f.projectStatus);

  if (!projetos.length) {
    return `<div class="card"><div class="empty"><i class="ti ti-folder-off"></i><p>${state.projetos&&state.projetos.length?'Nenhuma pessoa ou projeto corresponde aos filtros selecionados.':'Nenhum projeto cadastrado.'}</p>${state.projetos&&state.projetos.length?`<small><button class="btn btn-secondary btn-sm" onclick="clearAllocationMatrixFilters()"><i class="ti ti-x"></i> Limpar filtros</button></small>`:''}</div></div>`;
  }

  const linhas = projetos.map(p => {
    const fase = getProjectCurrentPhase(p);
    const prog = calculateProjectProgress(p);
    const st = getProjectExecutiveStatus(p);
    const dl = p.goLive ? daysLeft(p.goLive) : null;
    const mesmaPessoa = p.consultor && p.analista && normalizePersonName(p.consultor)===normalizePersonName(p.analista);
    const profissionais = mesmaPessoa
      ? `<div style="font-size:12px"><span style="color:var(--gray-400)">Consultor e Analista:</span> ${p.consultor}</div>`
      : `<div style="font-size:12px"><span style="color:var(--gray-400)">Consultor:</span> ${p.consultor||'—'}</div><div style="font-size:12px"><span style="color:var(--gray-400)">Analista:</span> ${p.analista||'—'}</div>`;
    const semInicio = !p.dataInicio, semGoLive = !p.goLive;
    return `<tr>
      <td style="cursor:pointer" onclick="abrirProjeto('${p.id}')"><div style="font-size:13px;font-weight:600;color:var(--accent)">${p.nome}</div><div style="font-size:11px;color:var(--gray-400)">${p.cliente||'—'}</div></td>
      <td>${fase.notStarted?`<span class="badge badge-gray" style="font-size:10px">Não iniciada</span>`:faseBadge(fase.name)}</td>
      <td><div style="font-size:13px;font-weight:700;color:${prog.percent===100?'var(--success)':'var(--accent)'}">${prog.percent}%</div></td>
      <td>${profissionais}</td>
      <td><div style="font-size:12px">${semInicio?'<span style="color:var(--warn)" title="Projeto sem início">Sem início</span>':fmt(p.dataInicio)}</div><div style="font-size:12px;color:${dl!=null&&dl<0?'var(--danger)':dl!=null&&dl<=30?'var(--warn)':'var(--gray-500)'}">${semGoLive?'<span style="color:var(--warn)" title="Projeto sem Go-live">Sem Go-live</span>':fmt(p.goLive)}${dl!=null?` <span style="font-size:10px">(${dl<0?Math.abs(dl)+'d venc.':dl+'d'})</span>`:''}</div></td>
      <td><div style="display:flex;gap:4px;flex-wrap:wrap;max-width:130px">${renderProjectModules(p,{compact:true,hideWhenEmpty:true})||'<span style="font-size:11px;color:var(--gray-300)">—</span>'}</div></td>
      <td><span class="badge ${st.badgeClass}" style="font-size:10px">${st.label}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" style="padding:3px 5px" title="Abrir projeto" onclick="abrirProjeto('${p.id}')"><i class="ti ti-folder"></i></button>
        <button class="btn btn-ghost btn-sm" style="padding:3px 5px" title="Editar projeto" onclick="editarProjeto('${p.id}')"><i class="ti ti-edit"></i></button>
        <button class="btn btn-ghost btn-sm" style="padding:3px 5px" title="Resumo executivo" onclick="showProjectExecutiveSummary('${p.id}')"><i class="ti ti-briefcase"></i></button>
      </td>
    </tr>`;
  }).join('');
  return `<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table style="width:100%;min-width:900px">
    <thead><tr><th>Projeto</th><th>Fase atual</th><th>Progr.</th><th>Profissionais</th><th>Início / Go-live</th><th>Módulos</th><th>Situação</th><th>Ações</th></tr></thead>
    <tbody>${linhas}</tbody>
  </table></div></div>`;
}

// ==================== DETALHE DA PESSOA ====================
function showPersonAllocationMatrixDetails(personKey) {
  const people = getAllocationMatrixPeople();
  const person = people.find(p => p.personKey === personKey);
  if (!person) return;
  const allLinks = getProjectAllocationLinks().filter(l => l.personKey === personKey);
  const summary = calculatePersonAllocationSummary(person, allLinks);
  const hoje = _hojeLocal();

  // ordena vínculos: vencido → termina em 30d → ativo → futuro → concluído
  const rank = { expired:0, 'ending-soon':1, active:2, future:3, undated:4, completed:5 };
  const linksSorted = [...allLinks].sort((a,b) => rank[getAllocationLinkStatus(a,hoje).key] - rank[getAllocationLinkStatus(b,hoje).key]);

  // concorrência: do primeiro início ao último término
  let concorrencia = null;
  const starts = allLinks.map(l=>parseLocalDate(l.startDate)).filter(Boolean);
  const ends = allLinks.map(l=>parseLocalDate(l.endDate)).filter(Boolean);
  if (starts.length && ends.length) {
    const minS = new Date(Math.min(...starts.map(d=>d.getTime())));
    const maxE = new Date(Math.max(...ends.map(d=>d.getTime())));
    concorrencia = calculatePersonProjectConcurrency(allLinks, minS, maxE);
  }
  const sobreposicoes = concorrencia ? concorrencia.monthlyCounts.filter(mc => mc.projectCount > 1) : [];

  const projetosHTML = linksSorted.map(l => {
    const stv = getAllocationLinkStatus(l, hoje);
    const fase = l.currentPhase;
    return `<tr style="cursor:pointer" onclick="closeModal();abrirProjeto('${l.projectId}')">
      <td><div style="font-size:12px;font-weight:600;color:var(--accent)">${l.projectName}</div><div style="font-size:11px;color:var(--gray-400)">${l.clientName}</div></td>
      <td style="font-size:11px;color:var(--gray-600)">${l.roleInProject==='consultor-analista'?'Consultor e Analista':l.roleInProject.charAt(0).toUpperCase()+l.roleInProject.slice(1)}</td>
      <td style="font-size:11px">${l.startDate?fmt(l.startDate):'—'}<br>${l.endDate?fmt(l.endDate):'—'}</td>
      <td>${fase.notStarted?`<span class="badge badge-gray" style="font-size:9px">Não iniciada</span>`:faseBadge(fase.name)}<div style="font-size:11px;font-weight:700;color:var(--accent);margin-top:2px">${l.projectProgress.percent}%</div></td>
      <td style="font-size:11px;text-align:center">${l.riskSummary.open+l.riskSummary.monitoring}${l.activeBlockers>0?`<div style="color:var(--danger)"><i class="ti ti-ban" style="font-size:11px"></i> ${l.activeBlockers}</div>`:''}</td>
      <td><span class="badge ${stv.badgeClass}" style="font-size:9px">${stv.label}</span></td>
    </tr>`;
  }).join('');

  const fmtD = d => d ? fmt(d.toISOString().slice(0,10)) : '—';

  openModal(`<div class="modal-header">
    <div class="modal-title"><i class="ti ti-calendar-user" style="margin-right:8px;color:var(--accent)"></i>Alocação — ${person.personName}</div>
    <button class="btn btn-ghost" onclick="closeModal()"><i class="ti ti-x"></i></button>
  </div>
  <div class="modal-body">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center">
      <span class="badge badge-blue">${summary.role}</span>
      <span style="font-size:12px;color:var(--gray-500)">${person.userType?person.userType.charAt(0).toUpperCase()+person.userType.slice(1):'—'}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px">
      <div style="background:var(--gray-50);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:var(--gray-500)">Ativos hoje</div><div style="font-size:20px;font-weight:800;color:var(--accent)">${summary.simultaneousProjectsToday}</div></div>
      <div style="background:var(--gray-50);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:var(--gray-500)">Futuros</div><div style="font-size:20px;font-weight:800;color:var(--gray-700)">${summary.futureProjects}</div></div>
      <div style="background:var(--gray-50);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:var(--gray-500)">Encerrados</div><div style="font-size:20px;font-weight:800;color:var(--gray-700)">${summary.completedProjects}</div></div>
      <div style="background:var(--gray-50);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:var(--gray-500)">Primeiro início</div><div style="font-size:14px;font-weight:700;color:var(--gray-700)">${fmtD(summary.firstStartDate)}</div></div>
      <div style="background:var(--gray-50);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:var(--gray-500)">Próximo término</div><div style="font-size:14px;font-weight:700;color:var(--gray-700)">${fmtD(summary.nextProjectEndDate)}</div></div>
      <div style="background:var(--gray-50);border-radius:8px;padding:10px 12px"><div style="font-size:11px;color:var(--gray-500)">Última prevista</div><div style="font-size:14px;font-weight:700;color:var(--gray-700)">${fmtD(summary.lastExpectedEndDate)}${summary.ongoingOverdueProjects>0?'<span style="color:var(--danger)">*</span>':''}</div></div>
    </div>
    ${summary.ongoingOverdueProjects>0?`<div class="alert alert-warn" style="margin-bottom:14px;font-size:12px"><i class="ti ti-alert-triangle"></i> Previsão sujeita a revisão: existe projeto com Go-live vencido e ainda não concluído.</div>`:''}
    <div style="font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:8px">Projetos vinculados</div>
    <div style="max-height:30vh;overflow-y:auto;border:1px solid var(--gray-200);border-radius:8px;margin-bottom:16px">
      <table style="width:100%"><thead><tr><th>Projeto</th><th>Papel</th><th>Início/Go-live</th><th>Fase</th><th style="text-align:center">Riscos</th><th>Vínculo</th></tr></thead><tbody>${projetosHTML||'<tr><td colspan="6" style="text-align:center;color:var(--gray-400);padding:16px">Nenhum vínculo</td></tr>'}</tbody></table>
    </div>
    ${sobreposicoes.length?`<div style="font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:8px">Meses com projetos simultâneos</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">${sobreposicoes.map(mc=>`<span class="badge ${mc.projectCount>=4?'badge-warn':'badge-blue'}" style="font-size:11px">${mc.label} — ${mc.projectCount} projetos</span>`).join('')}</div>`:''}
    <div style="font-size:11px;color:var(--gray-400);background:var(--gray-50);border-radius:8px;padding:10px 12px"><i class="ti ti-info-circle" style="font-size:12px"></i> A quantidade de projetos é informativa. A capacidade deve ser avaliada pelo gestor considerando fase, complexidade e esforço de cada projeto.</div>
  </div>`, true);
}

        <option value="consultor">Consultor — vê somente projetos onde é consultor</option>
        <option value="analista">Analista — vê somente projetos onde é analista</option>
        <option value="gestor">Gestor de projetos — acesso completo e configurações</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Cor do avatar</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${colors.map((c,i)=>`<div onclick="selectColor('${c}')" id="col-${i}" style="width:32px;height:32px;border-radius:50%;background:${c};cursor:pointer;border:3px solid transparent;transition:border .15s" class="color-opt"></div>`).join('')}
      </div>
      <input type="hidden" id="uColor" value="${colors[0]}">
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarUsuario()"><i class="ti ti-check"></i> Criar usuário</button>
  </div>`);
  setTimeout(()=>{ document.querySelectorAll('.color-opt')[0]?.style.setProperty('border-color','#000'); }, 50);
}

function selectColor(c) {
  document.getElementById('uColor').value = c;
  document.querySelectorAll('.color-opt').forEach(el => el.style.borderColor = 'transparent');
  event.target.style.borderColor = '#000';
}

function salvarUsuario() {
  const nome = document.getElementById('uNome').value.trim();
  if (!nome) return alert('Nome é obrigatório');
  const initials = nome.split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
  const tipo = document.getElementById('uTipo').value;
  state.users.push({id:uid(), name:nome, role:document.getElementById('uRole').value, tipo, color:document.getElementById('uColor').value, initials});
  saveState(); closeModal(); renderUsuarios();
}

function removerUsuario(id) {
  if (state.currentUser?.id === id) return alert('Não é possível remover o usuário logado.');
  if (!confirm('Remover este usuário?')) return;
  state.users = state.users.filter(u=>u.id!==id);
  saveState(); renderUsuarios();
}

// ==================== MODAL UTILS ====================
function openModal(html, large) {
  const box = document.getElementById('modal-box');
  box.className = 'modal' + (large === 'xl' ? ' modal-xl' : large ? ' modal-lg' : '');
  box.innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
function closeModalOnOverlay(e) { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

// ==================== INIT ====================
loadState();
renderUserSelect();

// Restaura sessão ativa (se o usuário já entrou antes e o token ainda é válido).
(async function initAuth() {
  if (!sbClient) return;
  try {
    const { data } = await sbClient.auth.getSession();
    if (data && data.session && data.session.user) {
      await onAuthenticated(data.session.user);
    }
  } catch (e) { /* mantém tela de login */ }
})();
</script>
