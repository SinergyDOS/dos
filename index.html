    <button class="btn btn-ghost" onclick="fecharDePara()"><i class="ti ti-x"></i></button>
  </div>
  <div class="modal-body" style="padding:16px">
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-secondary btn-sm" onclick="deParaSugerir()"><i class="ti ti-bulb"></i> Sugerir vínculos</button>
      <div style="flex:1"></div>
      <span style="font-size:12px;color:var(--gray-500)"><strong style="color:var(--success)">${comVinc}</strong> vinculadas · <strong>${semVinc}</strong> sem vínculo · ${totalMicro} no total</span>
    </div>

    <div style="display:grid;grid-template-columns:minmax(300px,1fr) 2fr;gap:16px;align-items:start">
      <!-- ESQUERDA: macro -->
      <div>
        <div style="font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px">Atividades macro (${mappings.length})</div>
        <div style="max-height:52vh;overflow-y:auto;padding-right:4px">${macroCards}</div>
      </div>
      <!-- DIREITA: micro -->
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px">
          <div style="font-size:12px;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.4px">Tarefas micro</div>
          <div style="display:flex;gap:6px">${btnFiltro('todas','Todas',totalMicro)}${btnFiltro('vinculadas','Vinculadas',comVinc)}${btnFiltro('sem-vinculo','Sem vínculo',semVinc)}</div>
        </div>
        ${macroSelObj ? `<div style="font-size:11px;color:var(--success);margin-bottom:6px;display:flex;align-items:center;gap:4px"><i class="ti ti-info-circle" style="font-size:12px"></i> As linhas em verde já estão vinculadas a <strong>${macros.find(m=>m.id===macroSelObj.macroActivityId)?.name || macroSelObj.macroNameSnapshot}</strong></div>` : ''}
        <div style="max-height:48vh;overflow-y:auto;border:1px solid var(--gray-200);border-radius:8px">
          <table style="width:100%;table-layout:auto">
            <thead style="position:sticky;top:0;z-index:1;background:var(--gray-50)"><tr>
              <th style="width:36px;text-align:center"><i class="ti ti-check"></i></th>
              <th>Tarefa</th><th>Fase</th><th>Tema</th><th>Macro vinculada</th>
            </tr></thead>
            <tbody>${microRows}</tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Barra de ações -->
    <div style="margin-top:14px;padding:12px 14px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <div style="font-size:12px;color:var(--gray-600)">
        ${macroSelObj ? `Macro selecionada: <strong>${macros.find(m=>m.id===macroSelObj.macroActivityId)?.name || macroSelObj.macroNameSnapshot}</strong>` : 'Selecione uma atividade macro à esquerda'}
        · <strong>${selMicroIds.size}</strong> tarefa(s) marcada(s)
      </div>
      <div style="flex:1"></div>
      <button class="btn btn-primary btn-sm" ${(!macroSelObj||selMicroIds.size===0)?'disabled style="opacity:.5"':''} onclick="deParaVincular()"><i class="ti ti-link"></i> Vincular selecionadas</button>
      <button class="btn btn-secondary btn-sm" ${selMicroIds.size===0?'disabled style="opacity:.5"':''} onclick="deParaRemoverVinculo()"><i class="ti ti-unlink"></i> Remover vínculo</button>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="fecharDePara()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarDePara()"><i class="ti ti-device-floppy"></i> Salvar DE-PARA</button>
  </div>`, 'xl');
}

function deParaSetFiltro(val) {
  if (!_deParaDraft) return;
  _deParaDraft.filtroMicro = val;
  renderModalDePara();
}

function deParaSelMacro(mappingId) {
  if (!_deParaDraft) return;
  _deParaDraft.selMacroId = _deParaDraft.selMacroId === mappingId ? null : mappingId;
  renderModalDePara();
}
function deParaToggleMicro(taskId, checked) {
  if (!_deParaDraft) return;
  if (checked) _deParaDraft.selMicroIds.add(taskId);
  else _deParaDraft.selMicroIds.delete(taskId);
  renderModalDePara();
}
function deParaEditKey(mappingId, val) {
  if (!_deParaDraft) return;
  const mp = _deParaDraft.mappings.find(m=>m.id===mappingId);
  if (!mp) return;
  const nova = gerarMacroKey(val);
  mp.macroKey = macroKeyUnica(nova, _deParaDraft.mappings, mp.id);
  _deParaDraft.dirty = true;
  renderModalDePara();
}
function deParaGerarKey(mappingId) {
  if (!_deParaDraft) return;
  const p = state.projetos.find(x=>x.id===_deParaDraft.pId);
  const mp = _deParaDraft.mappings.find(m=>m.id===mappingId);
  if (!mp) return;
  const macro = p.macroActivities.find(m=>m.id===mp.macroActivityId);
  const base = gerarMacroKey(macro ? macro.name : mp.macroNameSnapshot);
  mp.macroKey = macroKeyUnica(base, _deParaDraft.mappings, mp.id);
  _deParaDraft.dirty = true;
  renderModalDePara();
}

// Vincular tarefas selecionadas à macro selecionada (impede vínculo duplo)
function deParaVincular() {
  if (!_deParaDraft || !_deParaDraft.selMacroId || _deParaDraft.selMicroIds.size===0) return;
  const mpAlvo = _deParaDraft.mappings.find(m=>m.id===_deParaDraft.selMacroId);
  if (!mpAlvo) return;
  const p = state.projetos.find(x=>x.id===_deParaDraft.pId);
  // Se a macro ainda não tem macroKey, gera uma inicial a partir do nome
  if (!mpAlvo.macroKey) {
    const macro = p.macroActivities.find(m=>m.id===mpAlvo.macroActivityId);
    mpAlvo.macroKey = macroKeyUnica(gerarMacroKey(macro ? macro.name : mpAlvo.macroNameSnapshot), _deParaDraft.mappings, mpAlvo.id);
  }
  _deParaDraft.selMicroIds.forEach(tid => {
    // Remove o vínculo anterior desta tarefa em qualquer outro mapeamento (impede vínculo duplo)
    _deParaDraft.mappings.forEach(mp => {
      if (mp.id !== mpAlvo.id) mp.microTaskIds = (mp.microTaskIds||[]).filter(x=>x!==tid);
    });
    if (!mpAlvo.microTaskIds) mpAlvo.microTaskIds = [];
    if (!mpAlvo.microTaskIds.includes(tid)) mpAlvo.microTaskIds.push(tid);
  });
  _deParaDraft.selMicroIds.clear();
  _deParaDraft.dirty = true;
  renderModalDePara();
}

// Remover vínculo das tarefas selecionadas (de qualquer macro)
function deParaRemoverVinculo() {
  if (!_deParaDraft || _deParaDraft.selMicroIds.size===0) return;
  _deParaDraft.selMicroIds.forEach(tid => {
    _deParaDraft.mappings.forEach(mp => { mp.microTaskIds = (mp.microTaskIds||[]).filter(x=>x!==tid); });
  });
  _deParaDraft.selMicroIds.clear();
  _deParaDraft.dirty = true;
  renderModalDePara();
}

// Sugestão textual (nunca salva automaticamente)
function deParaSugerir() {
  if (!_deParaDraft) return;
  const p = state.projetos.find(x=>x.id===_deParaDraft.pId);
  const macros = p.macroActivities.filter(m=>m.importStatus!=='not-found');
  const mappings = _deParaDraft.mappings;
  // tarefas ainda sem vínculo no rascunho
  const jaVinc = new Set(); mappings.forEach(mp=>(mp.microTaskIds||[]).forEach(t=>jaVinc.add(t)));
  const semVinc = (p.tasks||[]).filter(t=>!jaVinc.has(t.id));

  const tokenize = (s) => String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().split(/[^a-z0-9]+/).filter(w=>w.length>2);
  const score = (macro, task) => {
    const setM = new Set([...tokenize(macro.name), ...tokenize(macro.phase)]);
    const setT = new Set([...tokenize(task.tarefa), ...tokenize(task.fase), ...tokenize(task.tema)]);
    let comuns = 0; const palavras=[];
    setT.forEach(w=>{ if(setM.has(w)){ comuns++; palavras.push(w);} });
    let pts = comuns * 10;
    // bônus se a fase da macro bate com a fase da tarefa
    if (macro.phase && task.fase && gerarMacroKey(macro.phase)===gerarMacroKey(task.fase)) pts += 15;
    return { pts, palavras };
  };

  const sugestoes = [];
  semVinc.forEach(task => {
    let melhor = null;
    mappings.forEach(mp => {
      const macro = macros.find(m=>m.id===mp.macroActivityId);
      if (!macro) return;
      const s = score(macro, task);
      if (s.pts > 0 && (!melhor || s.pts > melhor.pts)) melhor = { mp, macro, pts:s.pts, palavras:s.palavras };
    });
    if (melhor) sugestoes.push({ task, ...melhor });
  });
  sugestoes.sort((a,b)=>b.pts-a.pts);

  _deParaSugestoes = sugestoes;
  renderModalSugestoes();
}

let _deParaSugestoes = [];
function renderModalSugestoes() {
  const sugestoes = _deParaSugestoes || [];
  const linhas = sugestoes.map((s,i) => `<tr>
    <td style="text-align:center"><input type="checkbox" class="task-check" id="sug-${i}" ${s.pts>=20?'checked':''}></td>
    <td style="font-size:12px;font-weight:500;max-width:200px">${s.task.tarefa}</td>
    <td style="font-size:12px;color:var(--gray-600)">${s.macro.name}</td>
    <td style="text-align:center"><span class="badge ${s.pts>=30?'badge-green':s.pts>=15?'badge-warn':'badge-gray'}" style="font-size:10px">${s.pts}</span></td>
    <td style="font-size:11px;color:var(--gray-500)">${s.palavras.length?('palavras: '+s.palavras.slice(0,4).join(', ')):'fase compatível'}</td>
  </tr>`).join('');

  openModal(`<div class="modal-header">
    <div class="modal-title"><i class="ti ti-bulb" style="margin-right:8px;color:var(--accent)"></i>Sugestão de vínculos</div>
    <button class="btn btn-ghost" onclick="renderModalDePara()"><i class="ti ti-x"></i></button>
  </div>
  <div class="modal-body">
    <div class="alert alert-info"><i class="ti ti-info-circle"></i> Sugestões baseadas em comparação textual. <strong>Nada é salvo automaticamente</strong> — revise e aceite o que fizer sentido.</div>
    ${sugestoes.length===0 ? `<div class="empty" style="padding:24px"><i class="ti ti-search-off"></i><p>Nenhuma sugestão encontrada</p><small>As tarefas sem vínculo não tiveram correspondência textual com as atividades macro.</small></div>` : `
    <div class="table-wrap" style="max-height:52vh;overflow-y:auto;border:1px solid var(--gray-200);border-radius:8px">
      <table style="width:100%">
        <thead style="position:sticky;top:0"><tr><th style="width:32px;text-align:center">Aceitar</th><th>Tarefa micro</th><th>Atividade macro sugerida</th><th style="text-align:center">Pontos</th><th>Justificativa</th></tr></thead>
        <tbody>${linhas}</tbody>
      </table>
    </div>`}
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="renderModalDePara()">Voltar</button>
    ${sugestoes.length>0 ? `<button class="btn btn-primary" onclick="aplicarSugestoes()"><i class="ti ti-check"></i> Aceitar selecionadas</button>` : ''}
  </div>`, true);
}

function aplicarSugestoes() {
  if (!_deParaDraft || !_deParaSugestoes) return;
  const p = state.projetos.find(x=>x.id===_deParaDraft.pId);
  _deParaSugestoes.forEach((s,i) => {
    const cb = document.getElementById('sug-'+i);
    if (cb && cb.checked) {
      const mp = _deParaDraft.mappings.find(m=>m.id===s.mp.id);
      if (!mp) return;
      if (!mp.macroKey) {
        const macro = p.macroActivities.find(m=>m.id===mp.macroActivityId);
        mp.macroKey = macroKeyUnica(gerarMacroKey(macro?macro.name:mp.macroNameSnapshot), _deParaDraft.mappings, mp.id);
      }
      // remove vínculo anterior e adiciona
      _deParaDraft.mappings.forEach(m => { if(m.id!==mp.id) m.microTaskIds=(m.microTaskIds||[]).filter(x=>x!==s.task.id); });
      if (!mp.microTaskIds) mp.microTaskIds = [];
      if (!mp.microTaskIds.includes(s.task.id)) mp.microTaskIds.push(s.task.id);
    }
  });
  _deParaDraft.dirty = true;
  renderModalDePara();
}

// Salvar o DE-PARA no projeto (persiste no localStorage)
function salvarDePara() {
  if (!_deParaDraft) return;
  const p = state.projetos.find(x=>x.id===_deParaDraft.pId);
  if (!p) return;
  const agora = new Date().toISOString();

  // Mantém apenas mapeamentos que têm macroKey OU tarefas vinculadas OU já existiam salvos
  const finais = _deParaDraft.mappings.filter(mp =>
    mp.macroKey || (mp.microTaskIds && mp.microTaskIds.length) || !mp._novo
  ).map(mp => {
    // Se ainda não tem macroKey mas tem vínculo, gera uma
    let macroKey = mp.macroKey;
    if (!macroKey && mp.microTaskIds && mp.microTaskIds.length) {
      const macro = p.macroActivities.find(m=>m.id===mp.macroActivityId);
      macroKey = macroKeyUnica(gerarMacroKey(macro?macro.name:mp.macroNameSnapshot), _deParaDraft.mappings, mp.id);
    }
    const macro = p.macroActivities.find(m=>m.id===mp.macroActivityId);
    return {
      id: mp.id,
      macroKey: macroKey || null,
      macroActivityId: mp.macroActivityId || null,
      macroExternalId: mp.macroExternalId || (macro?macro.externalId:null) || null,
      macroNameSnapshot: macro ? macro.name : (mp.macroNameSnapshot||''),
      microTaskIds: Array.isArray(mp.microTaskIds) ? [...mp.microTaskIds] : [],
      origem: mp.origem || 'projeto',
      // Salvar pela tela do projeto marca como ajuste manual → vira exceção local
      // e não será sobrescrito pela herança do template em futuras importações.
      _ajustadoManualmente: true,
      createdAt: mp.createdAt || agora,
      updatedAt: agora
    };
  });

  p.macroMappings = finais;

  // Sincroniza macroKey nas atividades macro correspondentes
  finais.forEach(mp => {
    const macro = p.macroActivities.find(m=>m.id===mp.macroActivityId);
    if (macro && mp.macroKey) macro.macroKey = mp.macroKey;
  });

  // Atualiza macroActivityId nas tarefas micro conforme o DE-PARA (mantém o campo já existente).
  // Não altera tarefas concluídas? -> apenas o vínculo lógico; status não é tocado.
  const taskToMacro = {};
  finais.forEach(mp => (mp.microTaskIds||[]).forEach(tid => { taskToMacro[tid] = mp.macroActivityId; }));
  (p.tasks||[]).forEach(t => {
    if (taskToMacro[t.id] !== undefined) t.macroActivityId = taskToMacro[t.id];
    else if (t.macroActivityId && !Object.values(taskToMacro).includes(t.macroActivityId)) {
      // tarefa que perdeu o vínculo no DE-PARA
      const aindaVinculada = finais.some(mp => (mp.microTaskIds||[]).includes(t.id));
      if (!aindaVinculada) {
        t.macroActivityId = null;
        // se o prazo tinha vindo da macro, limpa (não é mais governado por atividade macro)
        if (t.prazoOrigem === 'macro' && !t._prazoManual) { t.prazo = null; t.prazoOrigem = null; }
      }
    }
  });

  // Propaga as datas das atividades macro para os prazos das tarefas recém-vinculadas
  const prazosAtualizados = propagarPrazosMacro(p);

  saveState();
  _deParaDraft = null;
  _deParaSugestoes = [];
  closeModal();
  renderProjetoDetail(p);
  setTimeout(()=>alert('DE-PARA salvo com sucesso.' + (prazosAtualizados?`\n${prazosAtualizados} prazo(s) de tarefa atualizado(s) pelas datas do cronograma.`:'')), 100);
}

// Cancelar edição (descarta alterações não salvas)
function fecharDePara() {
  if (_deParaDraft && _deParaDraft.dirty) {
    if (!confirm('Há alterações não salvas no DE-PARA. Deseja descartá-las?')) return;
  }
  _deParaDraft = null;
  _deParaSugestoes = [];
  closeModal();
}

// Estado de expansão das fases na visão Lista do projeto (por projeto::fase)
if (!state.projFaseExpand) state.projFaseExpand = {};

// ==================== MACRO ENTREGA — núcleo de resolução e agrupamento ====================
// "Macro entrega" é a representação visual/operacional da atividade macro já existente
// (macroActivities + macroMappings). NÃO é uma entidade nova — apenas uma leitura das
// estruturas atuais. Estado de UI fica em uiState (separado dos dados de negócio).
const uiState = {
  expandedPhases: {},          // chave: pId::fase → bool
  expandedMacroDeliveries: {}, // chave: pId::fase::macroKeyOrId → bool
  _initedProjects: {},         // marca projetos já auto-expandidos
};

// Resolve a macro entrega de uma tarefa seguindo a ordem de prioridade definida:
// 1) macroActivityId da tarefa; 2) presença em macroMappings.microTaskIds;
// 3) localizar mapping; 4) localizar atividade por id/externalId/macroKey.
// Retorna sempre um objeto; quando não há vínculo, hasDelivery=false.
function resolveTaskMacroDelivery(project, task) {
  const semEntrega = {
    hasDelivery: false, macroActivityId: null, macroKey: null, macroName: null,
    macroPhase: null, startDate: null, endDate: null, progress: null, mappingStatus: 'sem-vinculo'
  };
  if (!project || !task) return semEntrega;
  const macros = Array.isArray(project.macroActivities) ? project.macroActivities : [];
  const mappings = Array.isArray(project.macroMappings) ? project.macroMappings : [];

  // 1) macroActivityId direto na tarefa
  let macro = null, mapping = null;
  if (task.macroActivityId) macro = macros.find(m => m.id === task.macroActivityId) || null;

  // 2/3) via macroMappings.microTaskIds → localizar o mapping que contém a tarefa
  if (!mapping) mapping = mappings.find(mp => Array.isArray(mp.microTaskIds) && mp.microTaskIds.includes(task.id)) || null;

  // 4) localizar a atividade macro pelo mapping (id, externalId ou macroKey)
  if (!macro && mapping) {
    macro = macros.find(m => m.id === mapping.macroActivityId)
         || (mapping.macroExternalId ? macros.find(m => m.externalId === mapping.macroExternalId) : null)
         || (mapping.macroKey ? macros.find(m => m.macroKey === mapping.macroKey) : null)
         || null;
  }
  // se achou macro mas não o mapping, tenta localizar o mapping correspondente
  if (macro && !mapping) {
    mapping = mappings.find(mp => mp.macroActivityId === macro.id
              || (mp.macroExternalId && mp.macroExternalId === macro.externalId)
              || (mp.macroKey && mp.macroKey === macro.macroKey)) || null;
  }

  if (!macro && !mapping) return semEntrega;

  // Mapping existe mas atividade não localizada → requer revisão
  const mappingStatus = mapping ? (statusMapeamento(mapping).key) : (macro ? 'configurado' : 'sem-vinculo');

  return {
    hasDelivery: !!(macro || mapping),
    macroActivityId: macro ? macro.id : (mapping ? mapping.macroActivityId : null),
    macroKey: (macro && macro.macroKey) || (mapping && mapping.macroKey) || null,
    macroName: (macro && macro.name) || (mapping && mapping.macroNameSnapshot) || '(atividade não localizada)',
    macroPhase: (macro && macro.phase) || null,
    startDate: (macro && macro.startDate) || null,
    endDate: (macro && macro.endDate) || null,
    progress: (macro && typeof macro.progress === 'number') ? macro.progress : null,
    mappingStatus,
    _macro: macro || null,
    _mapping: mapping || null
  };
}

// Progresso da macro entrega: prioriza tarefas micro; percentual do Planner é secundário.
function calculateMacroDeliveryProgress(project, macroActivity, tasksVinculadas) {
  const tasks = tasksVinculadas || [];
  const total = tasks.length;
  const completed = tasks.filter(t => t.status === 'concluida').length;
  const overdue = tasks.filter(t => t.prazo && t.status !== 'concluida' && daysLeft(t.prazo) < 0).length;
  const blocked = tasks.filter(t => t.status === 'bloqueada').length;
  const microProgress = total ? Math.round(completed / total * 100) : null;
  const importedProgress = (macroActivity && typeof macroActivity.progress === 'number') ? macroActivity.progress : null;
  return { microProgress, importedProgress, totalTasks: total, completedTasks: completed, overdueTasks: overdue, blockedTasks: blocked };
}

// Determina a situação visual da macro entrega, com prioridade quando há mais de uma condição.
function determineMacroDeliveryStatus(macroActivity, mapping, prog) {
  // 1) Requer revisão — mapping inconsistente ou atividade não localizada
  if (mapping && statusMapeamento(mapping).key === 'nao-localizada') return { key:'requer-revisao', label:'Requer revisão', badge:'badge-red', icon:'ti-alert-triangle' };
  if (mapping && !macroActivity) return { key:'requer-revisao', label:'Requer revisão', badge:'badge-red', icon:'ti-alert-triangle' };
  const total = prog.totalTasks;
  // 7) Sem tarefas
  if (total === 0) return { key:'sem-tarefas', label:'Sem tarefas', badge:'badge-gray', icon:'ti-unlink' };
  // 2) Bloqueada
  if (prog.blockedTasks > 0) return { key:'bloqueada', label:'Bloqueada', badge:'badge-red', icon:'ti-lock' };
  const iniciadas = prog.completedTasks + macroActivityIniciadasCount(macroActivity, prog);
  const fim = macroActivity && macroActivity.endDate ? macroActivity.endDate : null;
  const atrasadaPorData = fim && daysLeft(fim) < 0 && prog.completedTasks < total;
  // 3) Atrasada
  if (atrasadaPorData || prog.overdueTasks > 0) return { key:'atrasada', label:'Atrasada', badge:'badge-red', icon:'ti-alert-triangle' };
  // 4) Concluída
  if (prog.completedTasks === total) return { key:'concluida', label:'Concluída', badge:'badge-green', icon:'ti-circle-check' };
  // 8) Sem datas
  if (macroActivity && !macroActivity.startDate && !macroActivity.endDate) {
    // ainda assim pode estar em andamento; sem datas é informativo de menor prioridade
    if (prog.completedTasks === 0) return { key:'sem-datas', label:'Sem datas', badge:'badge-gray', icon:'ti-calendar-off' };
  }
  // 5) Em andamento
  if (prog.completedTasks > 0) return { key:'em-andamento', label:'Em andamento', badge:'badge-warn', icon:'ti-player-play' };
  // 6) Não iniciada
  return { key:'nao-iniciada', label:'Não iniciada', badge:'badge-gray', icon:'ti-clock' };
}
// helper: considera "iniciada" qualquer tarefa em_andamento/concluida/bloqueada (não altera dados)
function macroActivityIniciadasCount(_macro, prog) { return 0; } // reservado; prog já traz completed

// Ordena macro entregas: 1) data de início; 2) ordem do cronograma (hierarchyCode); 3) nome.
function sortMacroDeliveries(list) {
  const modo = state.ordenacaoLista || 'padrao';
  if (modo === 'vencimento') {
    // ordena pela data de TÉRMINO da macro entrega (mais próxima primeiro); sem data ao final
    return [...list].sort((a,b) => {
      const af = a.macroActivity && a.macroActivity.endDate ? a.macroActivity.endDate : null;
      const bf = b.macroActivity && b.macroActivity.endDate ? b.macroActivity.endDate : null;
      if (af && bf && af !== bf) return af < bf ? -1 : 1;
      if (af && !bf) return -1;
      if (!af && bf) return 1;
      const an = (a.macroActivity && a.macroActivity.name) || (a.mapping && a.mapping.macroNameSnapshot) || '';
      const bn = (b.macroActivity && b.macroActivity.name) || (b.mapping && b.mapping.macroNameSnapshot) || '';
      return an.localeCompare(bn);
    });
  }
  return [...list].sort((a,b) => {
    const am = a.macroActivity, bm = b.macroActivity;
    const ad = am && am.startDate ? am.startDate : null;
    const bd = bm && bm.startDate ? bm.startDate : null;
    if (ad && bd && ad !== bd) return ad < bd ? -1 : 1;
    if (ad && !bd) return -1;
    if (!ad && bd) return 1;
    const ah = am && am.hierarchyCode ? am.hierarchyCode : '';
    const bh = bm && bm.hierarchyCode ? bm.hierarchyCode : '';
    if (ah && bh && ah !== bh) return ah.localeCompare(bh, undefined, {numeric:true});
    const an = (am && am.name) || (a.mapping && a.mapping.macroNameSnapshot) || '';
    const bn = (bm && bm.name) || (b.mapping && b.mapping.macroNameSnapshot) || '';
    return an.localeCompare(bn);
  });
}

// Ordena tarefas: 1) macroOrder; 2) ordem no projeto (preserva); 3) prazo; 4) nome.
function sortHierarchyTasks(tasks) {
  const modo = state.ordenacaoLista || 'padrao';
  if (modo === 'vencimento') {
    // Ordena por prazo (mais próximo primeiro); tarefas sem prazo ao final; concluídas ao fim.
    return [...tasks].sort((a,b) => {
      const ac = a.status === 'concluida' ? 1 : 0, bc = b.status === 'concluida' ? 1 : 0;
      if (ac !== bc) return ac - bc;
      const ap = a.prazo || '9999-12-31', bp = b.prazo || '9999-12-31';
      if (ap !== bp) return ap < bp ? -1 : 1;
      return (a.tarefa||'').localeCompare(b.tarefa||'');
    });
  }
  // padrão: macroOrder → ordem do projeto → prazo → nome
  return [...tasks].sort((a,b) => {
    if (a.macroOrder != null && b.macroOrder != null && a.macroOrder !== b.macroOrder) return a.macroOrder - b.macroOrder;
    const ap = a.prazo || '9999-12-31', bp = b.prazo || '9999-12-31';
    if (ap !== bp) return ap < bp ? -1 : 1;
    return (a.tarefa||'').localeCompare(b.tarefa||'');
  });
}

// Agrupamento central: Projeto → Fase → Macro entrega → Tarefas (+ tarefas sem vínculo).
// Recebe a lista de tarefas JÁ filtrada. NÃO altera o estado principal.
function groupProjectTasksHierarchy(project, tasks) {
  const ordemFases = Object.keys(FASE_COLORS);
  const fasesPresentes = ordemFases.filter(f => tasks.some(t => t.fase === f));
  [...new Set(tasks.map(t => t.fase))].forEach(f => { if (!fasesPresentes.includes(f)) fasesPresentes.push(f); });

  return fasesPresentes.map(fase => {
    const tsFase = tasks.filter(t => t.fase === fase);
    // agrupa por macro entrega dentro da fase
    const byDelivery = new Map(); // chave estável → {macroActivity, mapping, tasks}
    const unmapped = [];
    tsFase.forEach(t => {
      const d = resolveTaskMacroDelivery(project, t);
      if (!d.hasDelivery) { unmapped.push(t); return; }
      const chave = d.macroActivityId || d.macroKey || d.macroName;
      if (!byDelivery.has(chave)) byDelivery.set(chave, { macroActivity: d._macro, mapping: d._mapping, tasks: [] });
      byDelivery.get(chave).tasks.push(t);
    });

    let macroDeliveries = [...byDelivery.values()].map(entry => {
      const prog = calculateMacroDeliveryProgress(project, entry.macroActivity, entry.tasks);
      const status = determineMacroDeliveryStatus(entry.macroActivity, entry.mapping, prog);
      return { macroActivity: entry.macroActivity, mapping: entry.mapping, status, progress: prog, tasks: sortHierarchyTasks(entry.tasks) };
    });
    macroDeliveries = sortMacroDeliveries(macroDeliveries);

    // totais da fase (baseados nas tarefas micro)
    const allFaseTasks = tsFase;
    const completed = allFaseTasks.filter(t => t.status === 'concluida').length;
    const overdue = allFaseTasks.filter(t => t.prazo && t.status !== 'concluida' && daysLeft(t.prazo) < 0).length;
    const blocked = allFaseTasks.filter(t => t.status === 'bloqueada').length;
    const progress = allFaseTasks.length ? Math.round(completed / allFaseTasks.length * 100) : 0;

    return {
      phaseKey: fase, phaseName: fase,
      totals: { macroDeliveries: macroDeliveries.length, tasks: allFaseTasks.length, completed, overdue, blocked, progress },
      macroDeliveries,
      unmappedTasks: sortHierarchyTasks(unmapped)
    };
  });
}

// Tarefas sem macro entrega, agrupadas por fase (utilitário)
function getUnmappedTasksByPhase(project, tasks) {
  const out = {};
  (tasks||[]).forEach(t => {
    const d = resolveTaskMacroDelivery(project, t);
    if (!d.hasDelivery) { (out[t.fase] = out[t.fase] || []).push(t); }
  });
  return out;
}

// Lista as macro entregas únicas do projeto (para os selects de filtro)
function macroEntregasDoProjeto(project) {
  const seen = new Map();
  (project.tasks||[]).forEach(t => {
    const d = resolveTaskMacroDelivery(project, t);
    if (!d.hasDelivery) return;
    const key = d.macroActivityId || d.macroKey || d.macroName;
    if (!seen.has(key)) seen.set(key, { key, nome: d.macroName });
  });
  return [...seen.values()].sort((a,b)=>a.nome.localeCompare(b.nome));
}

// ── Estado de expansão (UI) ──
function togglePhaseExpansion(pId, fase) {
  const key = pId + '::' + fase;
  uiState.expandedPhases[key] = !uiState.expandedPhases[key];
  const p = state.projetos.find(x=>x.id===pId);
  if (p) renderTaskView(p);
}
function toggleMacroDeliveryExpansion(pId, fase, deliveryKey) {
  const key = pId + '::' + fase + '::' + deliveryKey;
  uiState.expandedMacroDeliveries[key] = !uiState.expandedMacroDeliveries[key];
  const p = state.projetos.find(x=>x.id===pId);
  if (p) renderTaskView(p);
}
function expandAllHierarchy(pId) {
  const p = state.projetos.find(x=>x.id===pId);
  if (!p) return;
  const grupos = groupProjectTasksHierarchy(p, getFilteredTasks(p));
  grupos.forEach(g => {
    uiState.expandedPhases[pId+'::'+g.phaseName] = true;
    g.macroDeliveries.forEach(d => {
      const dk = (d.macroActivity && d.macroActivity.id) || (d.macroActivity && d.macroActivity.macroKey) || d.status.key;
      uiState.expandedMacroDeliveries[pId+'::'+g.phaseName+'::'+dk] = true;
    });
    uiState.expandedMacroDeliveries[pId+'::'+g.phaseName+'::__unmapped'] = true;
  });
  renderTaskView(p);
}
function collapseAllHierarchy(pId) {
  const p = state.projetos.find(x=>x.id===pId);
  if (!p) return;
  Object.keys(uiState.expandedPhases).forEach(k => { if (k.startsWith(pId+'::')) uiState.expandedPhases[k] = false; });
  Object.keys(uiState.expandedMacroDeliveries).forEach(k => { if (k.startsWith(pId+'::')) uiState.expandedMacroDeliveries[k] = false; });
  renderTaskView(p);
}

function projToggleFase(pId, fase) {
  const key = pId + '::' + fase;
  state.projFaseExpand[key] = !state.projFaseExpand[key];
  const p = state.projetos.find(x=>x.id===pId);
  if (p) renderTaskView(p);
}
function projExpandirTodasFases(pId, expandir) {
  const p = state.projetos.find(x=>x.id===pId);
  if (!p) return;
  [...new Set((p.tasks||[]).map(t=>t.fase))].forEach(f => state.projFaseExpand[pId+'::'+f] = expandir);
  renderTaskView(p);
}

function renderLista(tasks, p, container) {
  if (!tasks.length) { container.innerHTML = `<div class="card"><div class="empty"><i class="ti ti-search-off"></i><p>Nenhuma tarefa encontrada</p><small>Ajuste os filtros acima</small></div></div>`; return; }

  const grupos = groupProjectTasksHierarchy(p, tasks);

  const acoes = `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--gray-500)"><i class="ti ti-arrows-sort" style="font-size:13px;vertical-align:-1px"></i> Ordenar por:</span>
        <select class="filter-select" onchange="state.ordenacaoLista=this.value;renderTaskView(state.projetos.find(x=>x.id==='${p.id}'))">
          <option value="padrao" ${(state.ordenacaoLista||'padrao')==='padrao'?'selected':''}>Ordem do cronograma</option>
          <option value="vencimento" ${state.ordenacaoLista==='vencimento'?'selected':''}>Data de vencimento (mais próximo primeiro)</option>
        </select>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="expandAllHierarchy('${p.id}')"><i class="ti ti-arrows-maximize"></i> Expandir tudo</button>
        <button class="btn btn-secondary btn-sm" onclick="collapseAllHierarchy('${p.id}')"><i class="ti ti-arrows-minimize"></i> Recolher tudo</button>
      </div>
    </div>`;

  const blocos = grupos.map(g => renderPhaseGroup(p, g)).join('');
  container.innerHTML = acoes + blocos;
}

// Nível 2 — Fase
function renderPhaseGroup(p, g) {
  const fase = g.phaseName;
  const key = p.id + '::' + fase;
  const aberto = !!uiState.expandedPhases[key];
  const fc = FASE_COLORS[fase] || {bg:'#f1f5f9',color:'#64748b'};
  const T = g.totals;

  const corpoMacros = g.macroDeliveries.map(d => renderMacroDeliveryGroup(p, fase, d)).join('');
  const corpoUnmapped = g.unmappedTasks.length ? renderUnmappedGroup(p, fase, g.unmappedTasks) : '';

  return `<div class="card" style="margin-bottom:12px;padding:0;overflow:hidden">
    <div onclick="togglePhaseExpansion('${p.id}','${fase.replace(/'/g,"\\'")}')"
         style="padding:13px 16px;background:${fc.bg};display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none">
      <i class="ti ti-chevron-${aberto?'down':'right'}" style="font-size:16px;color:${fc.color}"></i>
      <i class="ti ti-folder" style="font-size:16px;color:${fc.color}"></i>
      <div style="font-size:13px;font-weight:700;color:${fc.color};flex:1">${fase}</div>
      <span style="font-size:11px;color:${fc.color};opacity:.85">${T.macroDeliveries} macro entrega${T.macroDeliveries!==1?'s':''} · ${T.tasks} tarefa${T.tasks!==1?'s':''}</span>
      ${T.blocked>0 ? `<span class="badge badge-red" style="font-size:10px"><i class="ti ti-lock"></i>${T.blocked}</span>` : ''}
      ${T.overdue>0 ? `<span class="badge badge-red" style="font-size:10px"><i class="ti ti-alert-triangle"></i>${T.overdue}</span>` : ''}
      <span style="font-size:11px;color:${fc.color};opacity:.85">${T.completed}/${T.tasks}</span>
      <div style="width:70px;height:6px;background:#ffffff99;border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${T.progress}%;background:${fc.color};border-radius:3px"></div>
      </div>
      <span style="font-size:12px;font-weight:700;color:${fc.color};min-width:38px;text-align:right">${T.progress}%</span>
    </div>
    ${aberto ? `<div style="padding:10px 12px;background:#fafbfc">${corpoMacros}${corpoUnmapped}</div>` : ''}
  </div>`;
}

// Nível 3 — Macro entrega
function renderMacroDeliveryGroup(p, fase, d) {
  const m = d.macroActivity;
  const dk = (m && m.id) || (m && m.macroKey) || (d.mapping && d.mapping.id) || d.status.key;
  const key = p.id + '::' + fase + '::' + dk;
  const aberto = !!uiState.expandedMacroDeliveries[key];
  const nome = (m && m.name) || (d.mapping && d.mapping.macroNameSnapshot) || '(atividade não localizada)';
  const st = d.status;
  const prog = d.progress;
  const pct = prog.microProgress != null ? prog.microProgress : (prog.importedProgress != null ? prog.importedProgress : 0);
  const conflito = (st.key === 'atrasada' || st.key === 'bloqueada' || st.key === 'requer-revisao');

  // Chips de data (início / término) — grandes e legíveis. O término destaca atraso.
  const temInicio = m && m.startDate;
  const temFim = m && m.endDate;
  const dlFim = temFim ? daysLeft(m.endDate) : null;
  const fimAtrasado = dlFim != null && dlFim < 0 && prog.completedTasks < prog.totalTasks;
  const chipInicio = temInicio
    ? `<span style="display:inline-flex;align-items:center;gap:5px;background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;border-radius:7px;padding:4px 10px;font-size:13px;font-weight:600">
         <i class="ti ti-player-play-filled" style="font-size:13px"></i>Início ${fmt(m.startDate)}</span>`
    : '';
  const chipFim = temFim
    ? `<span style="display:inline-flex;align-items:center;gap:5px;background:${fimAtrasado?'#fef2f2':'#f0fdf4'};color:${fimAtrasado?'#991b1b':'#166534'};border:1px solid ${fimAtrasado?'#fecaca':'#bbf7d0'};border-radius:7px;padding:4px 10px;font-size:13px;font-weight:700">

// Nível 4 — Tarefa (linha dentro da macro entrega; não repete o nome da macro)
function renderHierarchicalTaskRow(p, t) {
  const dl = t.prazo ? daysLeft(t.prazo) : null;
  const vencida = dl != null && dl < 0 && t.status !== 'concluida';
  const hoje = dl === 0 && t.status !== 'concluida';
  const proximo = dl != null && dl > 0 && dl <= 3 && t.status !== 'concluida';
  let prazoHTML;
  if (!t.prazo) {
    prazoHTML = `<span style="font-size:12px;color:var(--gray-300)">sem prazo</span>`;
  } else {
    const cor = vencida ? 'var(--danger)' : hoje ? '#b45309' : proximo ? '#b45309' : 'var(--gray-600)';
    const peso = (vencida||hoje||proximo) ? '700' : '500';
    const sufixo = t.status==='concluida' ? '' : (vencida ? ` (${Math.abs(dl)}d atraso)` : hoje ? ' (hoje)' : dl===1 ? ' (amanhã)' : proximo ? ` (${dl}d)` : '');
    prazoHTML = `<span style="font-size:12.5px;color:${cor};font-weight:${peso};white-space:nowrap">${vencida?'<i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px"></i> ':''}${fmt(t.prazo)}${sufixo}</span>`;
  }
  return `<tr ${vencida?'style="background:#fef2f2"':''}>
    <td><input type="checkbox" class="task-check" ${t.status==='concluida'?'checked':''} onchange="toggleTask('${p.id}','${t.id}',this.checked)"></td>
    <td style="max-width:340px;cursor:pointer;color:var(--gray-800);font-weight:500;${t.status==='concluida'?'text-decoration:line-through;color:var(--gray-400)':''}" onclick="abrirTarefa('${p.id}','${t.id}')">
      <span class="badge" style="background:${(TEMA_COLORS[t.tema]||'#64748b')}18;color:${TEMA_COLORS[t.tema]||'#64748b'};font-size:9px;margin-right:6px">${t.tema}</span>${t.tarefa} ${helpIconHTML(t)}
    </td>
    <td style="font-size:12px;color:var(--gray-600)">${t.responsavel||'—'}</td>
    <td>${statusBadge(t.status)}</td>
    <td>${prazoHTML}</td>
    <td style="font-size:12px;color:var(--gray-500)">${t.esforco||'—'}</td>
    <td>
      <select class="filter-select" style="border:none;background:transparent;font-size:11px;padding:2px 4px" onchange="mudarStatus('${p.id}','${t.id}',this.value)">
        ${Object.entries(STATUS_MAP).map(([k,v])=>`<option value="${k}" ${t.status===k?'selected':''}>${v.label}</option>`).join('')}
      </select>
    </td>
  </tr>`;
}

// Modal de detalhes da macro entrega
function renderMacroDeliveryDetails(pId, deliveryKey, fase) {
  const p = state.projetos.find(x=>x.id===pId);
  if (!p) return;
  const grupos = groupProjectTasksHierarchy(p, getFilteredTasks(p));
  const g = grupos.find(x => x.phaseName === fase);
  if (!g) return;
  const d = g.macroDeliveries.find(x => {
    const dk = (x.macroActivity && x.macroActivity.id) || (x.macroActivity && x.macroActivity.macroKey) || (x.mapping && x.mapping.id) || x.status.key;
    return String(dk) === String(deliveryKey);
  });
  if (!d) return;
  const m = d.macroActivity;
  const prog = d.progress;
  const nome = (m && m.name) || (d.mapping && d.mapping.macroNameSnapshot) || '(atividade não localizada)';
  const dur = (m && m.startDate && m.endDate) ? (Math.round((new Date(m.endDate)-new Date(m.startDate))/86400000)+1)+' dia(s)' : '—';
  const abertas = prog.totalTasks - prog.completedTasks;

  openModal(`<div class="modal-header">
    <div class="modal-title"><i class="ti ti-package" style="margin-right:8px;color:var(--accent)"></i>${nome}</div>
    <button class="btn btn-ghost" onclick="closeModal()"><i class="ti ti-x"></i></button>
  </div>
  <div class="modal-body">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <span class="badge ${d.status.badge}" style="font-size:11px"><i class="ti ${d.status.icon}"></i>${d.status.label}</span>
      <span class="badge" style="font-size:11px;background:${(FASE_COLORS[fase]||{bg:'#eef',color:'#559'}).bg};color:${(FASE_COLORS[fase]||{color:'#559'}).color}">${fase}</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div style="background:var(--gray-50);border-radius:8px;padding:10px 12px">
        <div style="font-size:11px;color:var(--gray-500)">Progresso pelas tarefas</div>
        <div style="font-size:20px;font-weight:800;color:${(prog.microProgress||0)===100?'var(--success)':'var(--accent)'}">${prog.microProgress!=null?prog.microProgress+'%':'—'}</div>
      </div>
      <div style="background:var(--gray-50);border-radius:8px;padding:10px 12px">
        <div style="font-size:11px;color:var(--gray-500)">Cronograma oficial (Planner)</div>
        <div style="font-size:20px;font-weight:800;color:var(--gray-600)">${prog.importedProgress!=null?prog.importedProgress+'%':'—'}</div>
      </div>
    </div>
    <table style="width:100%;margin-bottom:14px">
      <tbody style="font-size:13px">
        <tr><td style="color:var(--gray-500);padding:5px 0">Início</td><td style="text-align:right">${fmt(m&&m.startDate)}</td></tr>
        <tr><td style="color:var(--gray-500);padding:5px 0">Término</td><td style="text-align:right">${fmt(m&&m.endDate)}</td></tr>
        <tr><td style="color:var(--gray-500);padding:5px 0">Duração</td><td style="text-align:right">${dur}</td></tr>
        <tr><td style="color:var(--gray-500);padding:5px 0">Responsável de referência</td><td style="text-align:right">${(m&&m.responsible)||'—'}</td></tr>
        <tr><td style="color:var(--gray-500);padding:5px 0">Tarefas</td><td style="text-align:right">${prog.totalTasks}</td></tr>
        <tr><td style="color:var(--gray-500);padding:5px 0">Concluídas</td><td style="text-align:right">${prog.completedTasks}</td></tr>
        <tr><td style="color:var(--gray-500);padding:5px 0">Abertas</td><td style="text-align:right">${abertas}</td></tr>
        <tr><td style="color:var(--gray-500);padding:5px 0">Atrasadas</td><td style="text-align:right;color:${prog.overdueTasks?'var(--danger)':'inherit'}">${prog.overdueTasks}</td></tr>
        <tr><td style="color:var(--gray-500);padding:5px 0">Bloqueadas</td><td style="text-align:right;color:${prog.blockedTasks?'var(--danger)':'inherit'}">${prog.blockedTasks}</td></tr>

    <div style="font-size:12px;font-weight:700;color:var(--gray-600);margin-bottom:8px">Tarefas vinculadas</div>
    <div style="max-height:30vh;overflow-y:auto;border:1px solid var(--gray-200);border-radius:8px">
      <table style="width:100%">
        <tbody>${d.tasks.map(t=>`<tr>
          <td style="cursor:pointer;font-size:12px;font-weight:500" onclick="closeModal();abrirTarefa('${p.id}','${t.id}')">${t.tarefa}</td>

      <button class="btn btn-secondary btn-sm" onclick="closeModal();irParaCronogramaMacro('${p.id}','${(m&&m.id)||''}')"><i class="ti ti-external-link"></i> Ver no cronograma macro</button>

// Leva à aba de cronograma macro e destaca a atividade
function irParaCronogramaMacro(pId, macroId) {
  const p = state.projetos.find(x=>x.id===pId);
  if (!p) return;
  state.viewMode = 'macro';
  state._highlightMacroId = macroId || null;
  renderProjetoDetail(p);
  setTimeout(() => {
    if (macroId) {
      const row = document.querySelector(`[data-macro-row="${macroId}"]`);
      if (row) { row.scrollIntoView({behavior:'smooth', block:'center'}); row.style.transition='background .3s'; row.style.background='#fef9c3'; setTimeout(()=>{row.style.background='';}, 2000); }
    }
  }, 150);
}

function renderKanban(tasks, p, container) {
  const group = state.kanbanGroup;
  let groups;
  if (group === 'fase') groups = Object.keys(FASE_COLORS).filter(f => tasks.some(t=>t.fase===f));
  else if (group === 'tema') groups = [...new Set(tasks.map(t=>t.tema))];
  else groups = ['pendente','em_andamento','concluida','bloqueada'];

  const getBgColor = (g) => {
    if (group==='fase') return FASE_COLORS[g]?.color||'#64748b';
    if (group==='tema') return TEMA_COLORS[g]||'#64748b';
    return {pendente:'#64748b',em_andamento:'#d97706',concluida:'#16a34a',bloqueada:'#dc2626'}[g]||'#64748b';
  };

  container.innerHTML = `<div class="kanban-board">
    ${groups.map(g => {
      const gtasks = tasks.filter(t => group==='fase'?t.fase===g : group==='tema'?t.tema===g : t.status===g);
      const label = group==='status' ? STATUS_MAP[g]?.label||g : g;
      const color = getBgColor(g);
      return `<div class="kanban-col">
        <div class="kanban-col-header">
          <span style="color:${color}">${label}</span>
          <span class="badge" style="background:${color}18;color:${color}">${gtasks.length}</span>
        </div>
        ${gtasks.map(t => {
          const d = resolveTaskMacroDelivery(p, t);
          const ctx = d.hasDelivery ? `${t.fase.replace(/^Fase\s*/,'Fase ').split(' - ')[0]} · ${d.macroName}` : `${t.fase.split(' - ')[0]} · sem macro entrega`;
          return `<div class="kanban-card" style="border-left-color:${TEMA_COLORS[t.tema]||'#64748b'}" onclick="abrirTarefa('${p.id}','${t.id}')">
          <div style="font-size:10px;color:var(--gray-400);margin-bottom:3px;line-height:1.3"><i class="ti ti-package" style="font-size:10px;vertical-align:-1px"></i> ${ctx}</div>
          <div class="kanban-card-title">${t.tarefa} ${helpIconHTML(t)}</div>
          <div class="kanban-card-meta">
            ${group!=='status' ? statusBadge(t.status) : `<span class="badge" style="background:${(TEMA_COLORS[t.tema]||'#64748b')}18;color:${TEMA_COLORS[t.tema]||'#64748b'}">${t.tema}</span>`}
            <div style="font-size:10px;color:var(--gray-400)">${t.esforco||''}</div>
          </div>
        </div>`;}).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

function renderCalendario(tasks, p, container) {
  const year = state.calYear, month = state.calMonth;
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const today = new Date();

  const tasksByDate = {};
  tasks.filter(t=>t.prazo).forEach(t => {
    if (!tasksByDate[t.prazo]) tasksByDate[t.prazo] = [];
    tasksByDate[t.prazo].push(t);
  });

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <button class="btn btn-secondary btn-sm" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
    <div style="font-weight:600;font-size:15px">${monthNames[month]} ${year}</div>
    <button class="btn btn-secondary btn-sm" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
  </div>
  <div class="calendar-grid">
    ${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d=>`<div class="cal-day-header">${d}</div>`).join('')}`;

  for (let i=0; i<firstDay; i++) html += `<div class="cal-day other-month"></div>`;

  for (let d=1; d<=daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getDate()===d && today.getMonth()===month && today.getFullYear()===year;
    const dayTasks = tasksByDate[dateStr]||[];
    html += `<div class="cal-day${isToday?' today':''}">
      <div class="cal-date${isToday?' today-num':''}">${d}</div>
      ${dayTasks.slice(0,3).map(t=>{
        const d = resolveTaskMacroDelivery(p, t);
        const tip = `${p.nome} · ${t.fase} · ${d.hasDelivery?d.macroName:'sem macro entrega'} · ${t.tarefa}${t.responsavel?' · '+t.responsavel:''}${t.prazo?' · '+fmt(t.prazo):''}`;
        return `<div class="cal-task" style="background:${TEMA_COLORS[t.tema]||'#64748b'}22;color:${TEMA_COLORS[t.tema]||'#64748b'}" onclick="abrirTarefa('${p.id}','${t.id}')" title="${tip.replace(/"/g,'&quot;')}">${t.tarefa}</div>`;
      }).join('')}
      ${dayTasks.length>3?`<div style="font-size:9px;color:var(--gray-400)">+${dayTasks.length-3} mais</div>`:''}
    </div>`;
  }
  html += `</div>`;

  if (!tasks.filter(t=>t.prazo).length) {
    html += `<div class="alert alert-info" style="margin-top:16px"><i class="ti ti-info-circle"></i> Nenhuma tarefa tem prazo definido. Abra uma tarefa para definir um prazo.</div>`;
  }

  container.innerHTML = `<div class="card">${html}</div>`;
}

function changeMonth(delta) {
  state.calMonth += delta;
  if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
  if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  const p = state.projetos.find(x=>x.id===state.currentProjetoId);
  renderTaskView(p);
}

// ==================== TASK ACTIONS ====================
function toggleTask(pId, tId, checked) {
  const p = state.projetos.find(x=>x.id===pId);
  const t = p?.tasks?.find(x=>x.id===tId);
  if (t) {
    t.status = checked ? 'concluida' : 'pendente';
    saveState();
    renderSidebar();
    document.getElementById('nav-'+state.currentPage)?.classList.add('active');
  }
}

function mudarStatus(pId, tId, status) {
  const p = state.projetos.find(x=>x.id===pId);
  const t = p?.tasks?.find(x=>x.id===tId);
  if (t) {
    t.status = status;
    saveState();
    renderSidebar();
    document.getElementById('nav-'+state.currentPage)?.classList.add('active');
  }
}

function abrirTarefa(pId, tId) {
  const p = state.projetos.find(x=>x.id===pId);
  const t = p?.tasks?.find(x=>x.id===tId);

      ${statusBadge(t.status)}

    ${t.help ? `<div style="background:linear-gradient(180deg,#eff6ff,#f8fbff);border:1px solid #bfdbfe;border-radius:10px;padding:14px 16px;margin-bottom:16px">

        <i class="ti ti-bulb" style="font-size:16px;color:var(--accent)"></i>
        <span style="font-size:12px;font-weight:700;color:#1d4ed8;letter-spacing:.3px">ORIENTAÇÃO DA ATIVIDADE</span>
      </div>
      <div style="font-size:13px;color:var(--gray-700);line-height:1.65">${t.help}</div>
    </div>` : `<div style="background:var(--gray-50);border:1px dashed var(--gray-300);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:8px">
      <i class="ti ti-info-circle" style="font-size:15px;color:var(--gray-400)"></i>
      <span style="font-size:12px;color:var(--gray-400)">Esta atividade não possui orientação cadastrada.</span>
    </div>`}

    <div class="form-grid" style="margin-bottom:16px">
      <div><div class="form-label">Responsável</div><div style="font-size:13px">${t.responsavel||'—'}</div></div>
      <div><div class="form-label">Esforço estimado</div><div style="font-size:13px">${t.esforco||'—'}</div></div>
    </div>
    <div class="form-group">
      <label class="form-label">Status</label>
      <select class="form-input form-select" id="tStatus">
        ${Object.entries(STATUS_MAP).map(([k,v])=>`<option value="${k}" ${t.status===k?'selected':''}>${v.label}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Prazo</label>
      <input type="date" class="form-input" id="tPrazo" value="${t.prazo||''}">
    </div>
    <div class="form-group">
      <label class="form-label">Atividade macro vinculada <span style="font-weight:400;color:var(--gray-400)">(opcional)</span></label>
      <select class="form-input form-select" id="tMacroActivity">
        <option value="">Nenhuma</option>
        ${(Array.isArray(p.macroActivities)?p.macroActivities:[]).map(m=>`<option value="${m.id}" ${t.macroActivityId===m.id?'selected':''}>${m.name||'(sem nome)'}${m.phase?' — '+m.phase:''}</option>`).join('')}
      </select>
      ${(!p.macroActivities || !p.macroActivities.length) ? `<div style="font-size:11px;color:var(--gray-400);margin-top:5px"><i class="ti ti-info-circle" style="font-size:11px;vertical-align:-1px"></i> Importe o cronograma macro na aba do projeto para habilitar a vinculação.</div>` : ''}
    </div>
    <div class="form-group">
      <label class="form-label">Comentário / Observação</label>
      <textarea class="form-input form-textarea" id="tComentario" placeholder="Adicione notas ou observações...">${t.comentario||''}</textarea>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal()">Fechar</button>
    <button class="btn btn-primary" onclick="salvarTarefa('${pId}','${tId}')"><i class="ti ti-check"></i> Salvar</button>
  </div>`, true);
}

function salvarTarefa(pId, tId) {
  const p = state.projetos.find(x=>x.id===pId);
  const t = p?.tasks?.find(x=>x.id===tId);
  if (!t) return;
  t.status = document.getElementById('tStatus').value;
  const novoPrazo = document.getElementById('tPrazo').value;
  // Se o usuário alterou o prazo manualmente, marca para não ser sobrescrito pelas datas da macro
  if (novoPrazo !== (t.prazo || '')) {
    t.prazo = novoPrazo;
    t._prazoManual = !!novoPrazo;         // prazo manual definido; se limpou, volta a ser automático
    t.prazoOrigem = novoPrazo ? 'manual' : null;
  }
  t.comentario = document.getElementById('tComentario').value;
  // Vínculo opcional com atividade macro do cronograma
  const macroSel = document.getElementById('tMacroActivity');
  if (macroSel) t.macroActivityId = macroSel.value || null;
  saveState();
  closeModal();
  // Atualiza sidebar badge e recarrega a página de origem
  renderSidebar();
  document.getElementById('nav-'+state.currentPage)?.classList.add('active');
  if (state.currentPage === 'minhas-tarefas') {
    renderMinhasTarefas();
  } else {
    renderProjetoDetail(p);
  }
}

function modalAdicionarTarefa(pId) {
  const fases = Object.keys(FASE_COLORS);
  const temas = Object.keys(TEMA_COLORS);
  openModal(`<div class="modal-header">
    <div class="modal-title"><i class="ti ti-plus" style="margin-right:8px;color:var(--accent)"></i>Nova tarefa</div>
    <button class="btn btn-ghost" onclick="closeModal()"><i class="ti ti-x"></i></button>
  </div>
  <div class="modal-body">
    <div class="form-group"><label class="form-label">Tarefa *</label><input class="form-input" id="ntTarefa" placeholder="Descreva a tarefa"></div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Fase</label>
        <select class="form-input form-select" id="ntFase">${fases.map(f=>`<option>${f}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Tema</label>
        <select class="form-input form-select" id="ntTema">${temas.map(t=>`<option>${t}</option>`).join('')}</select></div>
    </div>
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Responsável</label><input class="form-input" id="ntResp" placeholder="Ex: Consultor, Analista..."></div>
      <div class="form-group"><label class="form-label">Esforço estimado</label><input class="form-input" id="ntEsforco" placeholder="Ex: 4 horas"></div>
    </div>
    <div class="form-group"><label class="form-label">Prazo</label><input type="date" class="form-input" id="ntPrazo"></div>
    <div class="form-group"><label class="form-label">Help / Orientação</label><textarea class="form-input form-textarea" id="ntHelp" placeholder="Descreva o objetivo e procedimento desta tarefa..."></textarea></div>
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarNovaTarefa('${pId}')"><i class="ti ti-check"></i> Adicionar</button>
  </div>`);
}

function salvarNovaTarefa(pId) {
  const tarefa = document.getElementById('ntTarefa').value.trim();
  if (!tarefa) return alert('Descreva a tarefa');
  const p = state.projetos.find(x=>x.id===pId);
  if (!p.tasks) p.tasks = [];
  p.tasks.push({
    id: uid(), tarefa, fase: document.getElementById('ntFase').value,
    tema: document.getElementById('ntTema').value,
    responsavel: document.getElementById('ntResp').value,
    esforco: document.getElementById('ntEsforco').value,
    prazo: document.getElementById('ntPrazo').value,
    help: document.getElementById('ntHelp').value,
    status: 'pendente', comentario: '', macroActivityId: null
  });
  saveState();
  closeModal();
  renderProjetoDetail(p);
}

// ==================== MINHAS TAREFAS (drill-down: Projeto → Fase → Tarefas) ====================
// Estado de expansão persistente entre re-renders
if (!state.mtExpandProj) state.mtExpandProj = {};   // { projetoId: true/false }
if (!state.mtExpandFase) state.mtExpandFase = {};   // { "projetoId::fase": true/false }
if (!state.mtExpandMacro) state.mtExpandMacro = {}; // { "projetoId::fase::deliveryKey": true/false }
if (!state.mtAgrupar) state.mtAgrupar = 'proj-fase-macro'; // agrupamento padrão

function mtToggleProjeto(pId) {
  state.mtExpandProj[pId] = !state.mtExpandProj[pId];
  renderMinhasTarefas();
}
function mtToggleFase(pId, fase) {
  const key = pId + '::' + fase;
  state.mtExpandFase[key] = !state.mtExpandFase[key];
  renderMinhasTarefas();
}
function mtToggleMacro(pId, fase, dk) {
  const key = pId + '::' + fase + '::' + dk;
  state.mtExpandMacro[key] = !state.mtExpandMacro[key];
  renderMinhasTarefas();
}
function mtSetAgrupar(v) {
  state.mtAgrupar = v;
  renderMinhasTarefas();
}
function mtExpandirTodos(expandir) {
  const nome = state.currentUser?.name || '';
  projetosVisiveis().forEach(p => {
    const minhas = (p.tasks||[]).filter(t => taskPertenceAoUsuario(t, nome));
    if (!minhas.length) return;
    state.mtExpandProj[p.id] = expandir;
    [...new Set(minhas.map(t=>t.fase))].forEach(f => {
      state.mtExpandFase[p.id+'::'+f] = expandir;
      // expande também as macro entregas
      const g = groupProjectTasksHierarchy(p, minhas.filter(t=>t.fase===f))[0];
      if (g) {
        g.macroDeliveries.forEach(d => {
          const dk = (d.macroActivity && d.macroActivity.id) || (d.macroActivity && d.macroActivity.macroKey) || d.status.key;
          state.mtExpandMacro[p.id+'::'+f+'::'+dk] = expandir;
        });
        state.mtExpandMacro[p.id+'::'+f+'::__unmapped'] = expandir;
      }
    });
  });
  renderMinhasTarefas();
}

function renderMinhasTarefas() {
  if (isGestor()) { nav('dashboard'); return; }

  const nome = state.currentUser?.name || '';
  const tipo = (state.currentUser?.tipo || '').toLowerCase();
  const tipoLabel = tipo === 'analista' ? 'Analista' : 'Consultor';

  document.getElementById('topbar-actions').innerHTML = `
    <span style="font-size:12px;color:var(--gray-500);background:var(--gray-100);padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:6px">
      <i class="ti ti-filter" style="font-size:13px"></i>
      Filtrando por perfil: <strong style="color:var(--accent)">${tipoLabel}</strong>
    </span>`;

  // Abas: "Por projeto" (hierarquia) e "Por vencimento" (lista única)
  if (!state.mtView) {
    let saved = null;
    try { saved = localStorage.getItem('implanta_mtView'); } catch(e) {}
    state.mtView = (saved === 'vencimento' || saved === 'hierarquia') ? saved : 'hierarquia';
  }
  const tabsHTML = `
    <div class="tabs" style="margin-bottom:18px">
      <button class="tab ${state.mtView==='hierarquia'?'active':''}" onclick="mtSetView('hierarquia')"><i class="ti ti-subtask"></i> Por projeto</button>
      <button class="tab ${state.mtView==='vencimento'?'active':''}" onclick="mtSetView('vencimento')"><i class="ti ti-calendar-due"></i> Por vencimento</button>
    </div>`;

  if (state.mtView === 'vencimento') {
    renderMyTasksDueView(tabsHTML);
    return;
  }
  // ── VISÃO POR PROJETO (hierárquica) — preservada ──
  renderMinhasTarefasHierarquia(tabsHTML);
}

function mtSetView(v) {
  state.mtView = v;
  try { localStorage.setItem('implanta_mtView', v); } catch(e) {}
  renderMinhasTarefas();
}

function renderMinhasTarefasHierarquia(tabsHTML) {
  const nome = state.currentUser?.name || '';
  const fStatus = state.mtFiltroStatus || '';
  const fFase   = state.mtFiltroFase   || '';

  // Agrupa por projeto → fase, considerando só as tarefas do usuário
  const projetos = projetosVisiveis().map(p => {
    const minhas = (p.tasks || [])
      .filter(t => taskPertenceAoUsuario(t, nome))
      .map(t => ({ ...t, _pId: p.id, _pNome: p.nome, _pCliente: p.cliente }));
    const filtradas = minhas.filter(t =>
      (!fStatus || t.status === fStatus) && (!fFase || t.fase === fFase)
    );
    return { p, minhas, filtradas };
  }).filter(x => x.minhas.length > 0);

  // Auto-expande na primeira visita: se o usuário tem só 1 projeto, abre ele automaticamente.
  // Só faz isso uma vez (flag _mtInit) para não sobrescrever a escolha manual do usuário.
  if (!state._mtInit) {
    state._mtInit = true;
    if (projetos.length === 1) {
      state.mtExpandProj[projetos[0].p.id] = true;
    }
  }

  // Estatísticas globais (sobre todas as tarefas do usuário, sem filtro)
  const todas = projetos.flatMap(x => x.minhas);
  const totalPendentes  = todas.filter(t => t.status !== 'concluida').length;
  const totalConcluidas = todas.filter(t => t.status === 'concluida').length;
  const totalVencidas   = todas.filter(t => t.prazo && daysLeft(t.prazo) < 0 && t.status !== 'concluida').length;
  const fasesGlobais = [...new Set(todas.map(t => t.fase))];

  const porData = (a,b) => (a.prazo||'9999') < (b.prazo||'9999') ? -1 : 1;

  // ── Card de tarefa (linha dentro da fase) ──
  function tarefaCardHTML(t) {
    const dl = daysLeft(t.prazo);
    const vencida = dl !== null && dl < 0 && t.status !== 'concluida';
    const hojeF = dl === 0 && t.status !== 'concluida';
    const tc = TEMA_COLORS[t.tema] || '#64748b';
    return `
      <div style="background:#fff;border:1px solid ${vencida?'var(--danger)':hojeF?'var(--warn)':'var(--gray-200)'};border-left:4px solid ${tc};border-radius:8px;padding:11px 14px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;transition:box-shadow .15s"
           onmouseenter="this.style.boxShadow='0 4px 12px rgba(0,0,0,.08)'" onmouseleave="this.style.boxShadow='none'">
        <input type="checkbox" class="task-check" ${t.status==='concluida'?'checked':''}
          onchange="toggleTaskMT('${t._pId}','${t.id}',this.checked)">
        <div style="cursor:pointer;min-width:0" onclick="abrirTarefa('${t._pId}','${t.id}')">
          <div style="font-size:13px;font-weight:600;color:var(--gray-900);${t.status==='concluida'?'text-decoration:line-through;color:var(--gray-400)':''};margin-bottom:4px;line-height:1.35">
            ${t.tarefa} ${helpIconHTML(t)}
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            <span class="badge" style="background:${tc}18;color:${tc};font-size:10px">${t.tema}</span>
            ${t.esforco ? `<span style="font-size:11px;color:var(--gray-400)"><i class="ti ti-clock" style="font-size:11px;vertical-align:-1px"></i> ${t.esforco}</span>` : ''}
            ${t.responsavel ? `<span style="font-size:11px;color:var(--gray-400)"><i class="ti ti-user" style="font-size:11px;vertical-align:-1px"></i> ${t.responsavel}</span>` : ''}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:132px">
          ${statusBadge(t.status)}
          <div style="display:flex;align-items:center;gap:6px">
            ${t.prazo ? `<span style="font-size:11px;color:${vencida?'var(--danger)':hojeF?'var(--warn)':'var(--gray-400)'};font-weight:${vencida||hojeF?'600':'400'}">
              <i class="ti ti-calendar" style="font-size:11px;vertical-align:-1px"></i>
              ${fmt(t.prazo)}${dl!==null&&t.status!=='concluida'?(dl<0?` (${Math.abs(dl)}d atraso)`:dl===0?' (hoje)':dl===1?' (amanhã)':''):''}</span>` :
              `<span style="font-size:11px;color:var(--gray-300)">sem prazo</span>`}
            <select class="filter-select" style="border:1px solid var(--gray-200);border-radius:6px;font-size:11px;padding:3px 6px;background:#fff" onchange="mudarStatusMT('${t._pId}','${t.id}',this.value)">
              ${Object.entries(STATUS_MAP).map(([k,v])=>`<option value="${k}" ${t.status===k?'selected':''}>${v.label}</option>`).join('')}
            </select>
          </div>
        </div>
      </div>`;
  }

  // ── Macro entrega dentro da fase (Minhas Tarefas) ──
  function mtMacroHTML(pId, p, fase, d) {
    const m = d.macroActivity;
    const dk = (m && m.id) || (m && m.macroKey) || (d.mapping && d.mapping.id) || d.status.key;
    const key = pId + '::' + fase + '::' + dk;
    const aberto = !!state.mtExpandMacro[key];
    const nome = (m && m.name) || (d.mapping && d.mapping.macroNameSnapshot) || '(atividade não localizada)';
    const prog = d.progress, st = d.status;
    const periodo = (m && (m.startDate || m.endDate)) ? `${fmt(m.startDate)} a ${fmt(m.endDate)}` : 'sem datas';
    const sorted = sortHierarchyTasks(d.tasks);
    return `<div style="margin-bottom:7px;border:1px solid var(--gray-200);border-radius:8px;overflow:hidden;background:#fff">
      <div onclick="mtToggleMacro('${pId}','${fase.replace(/'/g,"\\'")}','${String(dk).replace(/'/g,"\\'")}')"
           style="display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;user-select:none">
        <i class="ti ti-chevron-${aberto?'down':'right'}" style="font-size:14px;color:var(--gray-400)"></i>
        <i class="ti ti-package" style="font-size:14px;color:var(--accent)"></i>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:var(--gray-800)">${nome} <span class="badge ${st.badge}" style="font-size:9px"><i class="ti ${st.icon}"></i>${st.label}</span></div>
          <div style="font-size:10px;color:var(--gray-400)"><i class="ti ti-calendar" style="font-size:10px"></i> ${periodo}</div>
        </div>
        <span style="font-size:10px;color:var(--gray-400)">${prog.completedTasks}/${prog.totalTasks}</span>
      </div>
      ${aberto ? `<div style="display:flex;flex-direction:column;gap:7px;padding:8px 10px 10px 20px">${sorted.map(t=>tarefaCardHTML(t)).join('')}</div>` : ''}
    </div>`;
  }

  // ── Bloco de uma fase dentro de um projeto ──
  function faseHTML(pId, fase, tasks, projeto) {
    const key = pId + '::' + fase;
    const aberto = !!state.mtExpandFase[key];
    const fc = FASE_COLORS[fase] || {bg:'#f1f5f9', color:'#64748b'};
    const done = tasks.filter(t=>t.status==='concluida').length;
    const pct = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const venc = tasks.filter(t=>t.prazo && daysLeft(t.prazo)<0 && t.status!=='concluida').length;
    const sorted = [...tasks].sort(porData);

    // Corpo: com ou sem camada de macro entrega conforme o agrupamento escolhido
    let corpo;
    if (state.mtAgrupar === 'proj-fase-macro' && projeto) {
      const g = groupProjectTasksHierarchy(projeto, tasks)[0];
      if (g) {
        const macros = g.macroDeliveries.map(d => mtMacroHTML(pId, projeto, fase, d)).join('');
        const unmapped = g.unmappedTasks.length ? (function(){
          const dk='__unmapped'; const k=pId+'::'+fase+'::'+dk; const ab=!!state.mtExpandMacro[k];
          return `<div style="margin-bottom:7px;border:1px dashed var(--warn);border-radius:8px;overflow:hidden;background:#fffbeb">
            <div onclick="mtToggleMacro('${pId}','${fase.replace(/'/g,"\\'")}','__unmapped')" style="display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer">
              <i class="ti ti-chevron-${ab?'down':'right'}" style="font-size:14px;color:var(--warn)"></i>
              <i class="ti ti-link-off" style="font-size:14px;color:var(--warn)"></i>
              <div style="flex:1;font-size:12px;font-weight:600;color:#92400e">Sem macro entrega vinculada</div>
              <span class="badge badge-warn" style="font-size:9px">${g.unmappedTasks.length}</span>
            </div>
            ${ab?`<div style="display:flex;flex-direction:column;gap:7px;padding:8px 10px 10px 20px">${sortHierarchyTasks(g.unmappedTasks).map(t=>tarefaCardHTML(t)).join('')}</div>`:''}
          </div>`;
        })() : '';
        corpo = macros + unmapped;
      } else corpo = sorted.map(t=>tarefaCardHTML(t)).join('');
    } else {
      corpo = sorted.map(t => tarefaCardHTML(t)).join('');
    }

    return `
      <div style="margin:0 12px 8px">
        <div onclick="mtToggleFase('${pId}','${fase.replace(/'/g,"\\'")}')"
             style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:${fc.bg};border-radius:8px;cursor:pointer;user-select:none">
          <i class="ti ti-chevron-${aberto?'down':'right'}" style="font-size:15px;color:${fc.color};transition:transform .15s"></i>
          <i class="ti ti-folder" style="font-size:14px;color:${fc.color}"></i>
          <span style="font-size:12px;font-weight:700;color:${fc.color};flex:1">${fase}</span>
          ${venc>0 ? `<span class="badge badge-red" style="font-size:10px"><i class="ti ti-alert-triangle"></i>${venc}</span>` : ''}
          <span style="font-size:11px;color:${fc.color};opacity:.8">${done}/${tasks.length}</span>
          <div style="width:60px;height:5px;background:#ffffff88;border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${fc.color};border-radius:3px"></div>
          </div>
          <span style="font-size:11px;font-weight:700;color:${fc.color};min-width:34px;text-align:right">${pct}%</span>
        </div>
        ${aberto ? `<div style="padding:10px 6px 4px 26px">${corpo}</div>` : ''}
      </div>`;
  }

  // ── Bloco de um projeto ──
  function projetoHTML({ p, minhas, filtradas }) {
    const aberto = !!state.mtExpandProj[p.id];
    const done = minhas.filter(t=>t.status==='concluida').length;
    const pct = minhas.length ? Math.round(done/minhas.length*100) : 0;
    const venc = minhas.filter(t=>t.prazo && daysLeft(t.prazo)<0 && t.status!=='concluida').length;
    const pend = minhas.filter(t=>t.status!=='concluida').length;
    const dl = daysLeft(p.goLive);

    // Fases do projeto (respeitando a ordem canônica) que têm tarefas após o filtro
    const ordemFases = Object.keys(FASE_COLORS);
    const fasesDoProj = ordemFases.filter(f => filtradas.some(t => t.fase === f));
    const semResultado = filtradas.length === 0;

    return `
      <div class="card" style="padding:0;margin-bottom:14px;overflow:hidden">
        <div onclick="mtToggleProjeto('${p.id}')"
             style="display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;user-select:none;border-bottom:${aberto?'1px solid var(--gray-200)':'none'}">
          <i class="ti ti-chevron-${aberto?'down':'right'}" style="font-size:18px;color:var(--gray-400)"></i>
          <div style="width:38px;height:38px;border-radius:9px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <i class="ti ti-folder" style="font-size:19px;color:#fff"></i>
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700;color:var(--gray-900)">${p.nome}</div>
            <div style="font-size:12px;color:var(--gray-500)">${p.cliente} · Go-live: ${fmt(p.goLive)}
              ${dl!==null ? ` · <span style="color:${dl<0?'var(--danger)':dl<14?'var(--warn)':'var(--gray-500)'};font-weight:600">${dl<0?`${Math.abs(dl)}d atrasado`:`${dl}d restantes`}</span>` : ''}

// ==================== MINHAS TAREFAS — VISÃO POR VENCIMENTO ====================
// Consolida todas as microtarefas do usuário atual (todos os projetos vinculados),
// reutilizando taskPertenceAoUsuario e projetosVisiveis. Não cria nova regra de atribuição.
function getCurrentUserTasksWithProjectContext() {
  const nome = state.currentUser?.name || '';
  const out = [];
  projetosVisiveis().forEach(p => {
    (p.tasks || []).forEach(t => {
      if (!taskPertenceAoUsuario(t, nome)) return;
      let macroName = null;
      try {
        const d = resolveTaskMacroDelivery(p, t);
        macroName = d && d.hasDelivery ? d.macroName : null;
      } catch(e) { macroName = null; }
      out.push({
        task: t, taskId: t.id, project: p, projectId: p.id,
        projectName: p.nome, projectClient: p.cliente || '',
        taskName: t.tarefa || '', dueDate: t.prazo || t.plannedEndDate || null,
        status: t.status || 'pendente', phase: t.fase || null,
        tema: t.tema || null, responsavel: t.responsavel || null,
        macroDeliveryName: macroName
      });
    });
  });
  return out;
}

// Categoria de vencimento de uma tarefa (usa daysLeft, sem cálculo UTC deslocante)
function getTaskDueCategory(task) {
  if (task.status === 'concluida') return 'completed';
  if (!task.prazo) return 'no-date';
  const dl = daysLeft(task.prazo);
  if (dl == null) return 'no-date';
  if (dl < 0) return 'overdue';
  if (dl === 0) return 'today';
  if (dl === 1) return 'tomorrow';
  return 'upcoming';
}

// Texto discreto da situação de vencimento (não depende só de cor)
function dueCategoryText(item) {
  const cat = getTaskDueCategory(item.task);
  if (cat === 'completed') return { label: 'Concluída', badge: 'badge-green', icon: 'ti-check' };
  if (cat === 'no-date')   return { label: 'Sem vencimento', badge: 'badge-gray', icon: 'ti-calendar-off' };
  const dl = daysLeft(item.dueDate);
  if (cat === 'overdue')  return { label: `${Math.abs(dl)} dia${Math.abs(dl)>1?'s':''} em atraso`, badge: 'badge-red', icon: 'ti-alert-triangle' };
  if (cat === 'today')    return { label: 'Vence hoje', badge: 'badge-warn', icon: 'ti-clock' };
  if (cat === 'tomorrow') return { label: 'Vence amanhã', badge: 'badge-blue', icon: 'ti-calendar' };
  return { label: `Em ${dl} dias`, badge: 'badge-gray', icon: 'ti-calendar' };
}

// Ordenação por prioridade de vencimento (função centralizada)
function sortTasksByDueDatePriority(items) {
  const rank = { overdue:0, today:1, tomorrow:2, upcoming:3, 'no-date':4, completed:5 };
  const statusRank = { bloqueada:0, em_andamento:1, pendente:2, concluida:3 };
  return [...items].sort((a,b) => {
    const ca = getTaskDueCategory(a.task), cb = getTaskDueCategory(b.task);
    if (rank[ca] !== rank[cb]) return rank[ca] - rank[cb];
    // dentro de upcoming, ordena por data crescente
    if (ca === 'upcoming' || ca === 'overdue') {
      const ad = a.dueDate || '9999-12-31', bd = b.dueDate || '9999-12-31';
      if (ad !== bd) return ad < bd ? -1 : 1;
    }
    const sa = statusRank[a.status] ?? 9, sb = statusRank[b.status] ?? 9;
    if (sa !== sb) return sa - sb;
    if (a.projectName !== b.projectName) return a.projectName.localeCompare(b.projectName);
    return a.taskName.localeCompare(b.taskName);
  });
}

// Ordenações manuais alternativas
function sortDueItems(items, modo) {
  const semDataFim = (a,b,dir) => {
    const an = !a.dueDate, bn = !b.dueDate;
    const ac = a.status==='concluida', bc = b.status==='concluida';
    if (ac !== bc) return ac ? 1 : -1;           // concluídas ao final
    if (an !== bn) return an ? 1 : -1;           // sem data antes das concluídas, depois das com data
    if (!an && !bn && a.dueDate !== b.dueDate) return dir==='asc' ? (a.dueDate<b.dueDate?-1:1) : (a.dueDate<b.dueDate?1:-1);
    return 0;
  };
  const statusRank = { bloqueada:0, em_andamento:1, pendente:2, concluida:3 };
  switch (modo) {
    case 'date-asc': return [...items].sort((a,b)=> semDataFim(a,b,'asc') || a.projectName.localeCompare(b.projectName) || a.taskName.localeCompare(b.taskName));
    case 'date-desc': return [...items].sort((a,b)=> semDataFim(a,b,'desc') || a.projectName.localeCompare(b.projectName) || a.taskName.localeCompare(b.taskName));
    case 'project': return [...items].sort((a,b)=> a.projectName.localeCompare(b.projectName) || ((a.dueDate||'9999')<(b.dueDate||'9999')?-1:1) || a.taskName.localeCompare(b.taskName));
    case 'status': return [...items].sort((a,b)=> ((statusRank[a.status]??9)-(statusRank[b.status]??9)) || ((a.dueDate||'9999')<(b.dueDate||'9999')?-1:1) || a.projectName.localeCompare(b.projectName));
    case 'task': return [...items].sort((a,b)=> a.taskName.localeCompare(b.taskName) || a.projectName.localeCompare(b.projectName));
    default: return sortTasksByDueDatePriority(items);
  }
}

// Normaliza texto (ignora acento e caixa) para busca
function _normTxt(s) {
  return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
}

// Aplica filtros da aba por vencimento
function filterTasksByDueView(items) {
  const fProj = state.mtDueProject || '';
  const fStatus = state.mtDueStatus || '';
  const fPhase = state.mtDuePhase || '';
  const fPeriod = state.mtDuePeriod || 'todas';
  const busca = _normTxt(state.mtDueSearch || '');
  const hideCompleted = state.mtDueHideCompleted !== false; // padrão true

  return items.filter(it => {
    if (hideCompleted && it.status === 'concluida' && fPeriod !== 'concluidas') return false;
    if (fProj && it.projectId !== fProj) return false;
    if (fStatus && it.status !== fStatus) return false;
    if (fPhase && it.phase !== fPhase) return false;
    if (fPeriod && fPeriod !== 'todas') {
      const cat = getTaskDueCategory(it.task);
      const dl = it.dueDate ? daysLeft(it.dueDate) : null;
      if (fPeriod === 'vencidas' && cat !== 'overdue') return false;
      else if (fPeriod === 'hoje' && cat !== 'today') return false;
      else if (fPeriod === 'amanha' && cat !== 'tomorrow') return false;
      else if (fPeriod === 'prox7' && !(it.status!=='concluida' && dl!=null && dl>=0 && dl<=7)) return false;
      else if (fPeriod === 'prox15' && !(it.status!=='concluida' && dl!=null && dl>=0 && dl<=15)) return false;
      else if (fPeriod === 'prox30' && !(it.status!=='concluida' && dl!=null && dl>=0 && dl<=30)) return false;
      else if (fPeriod === 'sem-data' && cat !== 'no-date') return false;
      else if (fPeriod === 'concluidas' && it.status !== 'concluida') return false;
    }
    if (busca) {
      const alvo = _normTxt([it.taskName, it.projectName, it.phase, it.macroDeliveryName, it.tema].filter(Boolean).join(' '));
      if (!alvo.includes(busca)) return false;
    }
    return true;
  });
}

// Indicadores do topo (só tarefas não concluídas)
function calculateMyTasksDueIndicators(items) {
  const abertas = items.filter(i => i.status !== 'concluida');
  const vencidas = abertas.filter(i => getTaskDueCategory(i.task) === 'overdue').length;
  const hoje = abertas.filter(i => getTaskDueCategory(i.task) === 'today').length;
  const prox7 = abertas.filter(i => { const dl = i.dueDate?daysLeft(i.dueDate):null; return dl!=null && dl>=0 && dl<=7; }).length;
  const semData = abertas.filter(i => !i.dueDate).length;
  return { vencidas, hoje, prox7, semData };
}
